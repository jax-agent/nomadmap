<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NomadMap — Find Your Next Base</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#ff2d2d;--bg:#080808;--surface:#0f0f0f;--border:#1a1a1a;--text:#e0e0e0;--muted:#555;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;}

/* Layout */
#app{display:grid;grid-template-rows:52px 1fr;grid-template-columns:320px 1fr;height:100vh;}
#topbar{grid-column:1/-1;grid-row:1;display:flex;align-items:center;gap:12px;padding:0 16px;background:rgba(8,8,8,0.97);border-bottom:1px solid var(--border);z-index:1000;}
#sidebar{grid-column:1;grid-row:2;overflow-y:auto;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
#map-wrap{grid-column:2;grid-row:2;position:relative;}
#map{width:100%;height:100%;}

/* Topbar */
.logo{font-size:16px;font-weight:800;letter-spacing:-0.02em;white-space:nowrap;color:#fff;}
.logo span{color:var(--red);}
#search{flex:1;max-width:340px;padding:7px 14px;background:#111;border:1px solid #222;border-radius:6px;color:#fff;font-size:13px;outline:none;}
#search:focus{border-color:var(--red);}
.view-btns{display:flex;gap:4px;margin-left:auto;}
.view-btn{padding:6px 14px;border-radius:5px;font-size:12px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;border:1px solid #222;background:transparent;color:#555;cursor:pointer;transition:all 0.15s;}
.view-btn.active{background:var(--red);color:#fff;border-color:var(--red);}
.nomad-count{font-size:11px;color:#333;white-space:nowrap;}

/* Filters */
#filters{padding:14px 16px;border-bottom:1px solid var(--border);}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.filter-row:last-child{margin-bottom:0;}
.filter-label{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:#444;margin-bottom:6px;}
select,input[type=range]{background:#111;border:1px solid #1e1e1e;color:#aaa;border-radius:4px;font-size:12px;padding:5px 8px;outline:none;cursor:pointer;}
select:focus{border-color:var(--red);}
.tag-filters{display:flex;gap:6px;flex-wrap:wrap;}
.tag-btn{padding:3px 10px;border-radius:20px;font-size:11px;border:1px solid #1e1e1e;background:transparent;color:#555;cursor:pointer;transition:all 0.15s;}
.tag-btn.active{border-color:var(--red);color:var(--red);}
.sort-row{display:flex;align-items:center;gap:8px;}
.sort-row label{font-size:11px;color:#444;}

/* City list */
#city-list{flex:1;overflow-y:auto;}
.city-card{padding:14px 16px;border-bottom:1px solid #0d0d0d;cursor:pointer;transition:background 0.1s;display:flex;gap:12px;align-items:flex-start;}
.city-card:hover{background:#111;}
.city-card.active{background:#110808;border-left:2px solid var(--red);}
.city-flag{font-size:20px;flex-shrink:0;margin-top:1px;}
.city-info{flex:1;min-width:0;}
.city-name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.city-country{font-size:11px;color:#555;margin-bottom:6px;}
.city-stats{display:flex;gap:10px;}
.stat{display:flex;flex-direction:column;align-items:center;}
.stat-val{font-size:12px;font-weight:700;}
.stat-label{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:0.05em;}
.city-score{flex-shrink:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;border:2px solid;}

/* Score colors */
.score-great{color:#2ecc71;border-color:#2ecc71;}
.score-good{color:#f39c12;border-color:#f39c12;}
.score-ok{color:#e74c3c;border-color:#e74c3c;}

/* Tags */
.city-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.city-tag{padding:2px 7px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;background:#111;color:#444;border:1px solid #1a1a1a;}

/* Map popup */
.map-popup{min-width:220px;}
.mp-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.mp-country{font-size:12px;color:#888;margin-bottom:10px;}
.mp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.mp-stat{background:#111;border-radius:6px;padding:8px;text-align:center;}
.mp-stat-val{font-size:16px;font-weight:800;}
.mp-stat-label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
.mp-tags{display:flex;gap:4px;flex-wrap:wrap;}
.mp-tag{padding:3px 8px;border-radius:3px;background:#0d0d0d;border:1px solid #222;font-size:10px;color:#666;}
.mp-btn{display:block;margin-top:10px;text-align:center;padding:8px;background:var(--red);color:#fff;border-radius:5px;font-size:12px;font-weight:700;text-decoration:none;cursor:pointer;border:none;width:100%;}
.mp-btn:hover{background:#ff4444;}

/* List view */
#list-view{display:none;grid-column:2;grid-row:2;overflow-y:auto;padding:24px;}
.list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.list-card{background:#0d0d0d;border:1px solid var(--border);border-radius:8px;padding:20px;cursor:pointer;transition:all 0.2s;}
.list-card:hover{border-color:#333;transform:translateY(-2px);}
.lc-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.lc-flag{font-size:28px;}
.lc-score{margin-left:auto;font-size:22px;font-weight:800;}
.lc-name{font-size:16px;font-weight:700;}
.lc-country{font-size:12px;color:#555;}
.lc-bars{display:flex;flex-direction:column;gap:6px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-label{font-size:10px;color:#555;width:60px;text-transform:uppercase;letter-spacing:0.04em;}
.bar-track{flex:1;height:4px;background:#1a1a1a;border-radius:2px;}
.bar-fill{height:4px;border-radius:2px;}
.lc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:12px;}

/* Leaflet overrides */
.leaflet-popup-content-wrapper{background:#0d0d0d!important;color:#e0e0e0!important;border:1px solid #222!important;border-radius:10px!important;box-shadow:0 8px 32px rgba(0,0,0,0.6)!important;}
.leaflet-popup-tip{background:#0d0d0d!important;}
.leaflet-popup-content{margin:14px!important;}
.leaflet-control-zoom{background:#111!important;border-color:#222!important;}
.leaflet-control-zoom a{background:#111!important;color:#fff!important;border-color:#222!important;}

/* Mobile */
@media(max-width:768px){
  #app{grid-template-columns:1fr;grid-template-rows:52px auto 1fr;}
  #sidebar{grid-row:2;grid-column:1;max-height:40vh;}
  #map-wrap{grid-row:3;grid-column:1;}
}

/* Auth */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;display:none;justify-content:center;align-items:center}
.auth-overlay.open{display:flex}
.auth-box{background:#0f0f0f;border:1px solid #222;border-radius:12px;padding:28px;width:360px;max-width:92vw}
.auth-box h2{color:#fff;text-align:center;font-size:17px;margin-bottom:18px}
.auth-tabs{display:flex;border-bottom:1px solid #1e1e1e;margin-bottom:18px}
.auth-tab{flex:1;padding:9px;text-align:center;color:#444;cursor:pointer;font-size:13px;border-bottom:2px solid transparent}
.auth-tab.on{color:var(--red);border-color:var(--red)}
.auth-box input{width:100%;padding:11px 12px;margin-bottom:10px;background:#111;border:1px solid #1e1e1e;border-radius:6px;color:#e0e0e0;font-size:13px}
.auth-box input:focus{border-color:var(--red);outline:none}
.auth-box .submit-btn{width:100%;padding:11px;background:var(--red);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer}
.auth-box .submit-btn:hover{background:#ff4444}
.auth-msg{font-size:12px;text-align:center;margin-top:10px;color:var(--red)}
.auth-msg.ok{color:#2ecc71}
.user-widget{display:flex;align-items:center;gap:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--red);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer}
.user-menu-dd{position:absolute;top:44px;right:16px;background:#0f0f0f;border:1px solid #222;border-radius:8px;min-width:150px;display:none;padding:4px 0;z-index:9999}
.user-menu-dd.open{display:block}
.user-menu-dd a{display:block;padding:9px 14px;font-size:12px;color:#aaa;cursor:pointer;text-decoration:none}
.user-menu-dd a:hover{color:#fff;background:#111}
.join-btn{padding:6px 14px;background:var(--red);color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.join-btn:hover{background:#ff4444}
/* Detail panel */
#detail-panel{position:absolute;top:0;right:-380px;width:360px;height:100%;background:#0a0a0a;border-left:1px solid #1a1a1a;z-index:500;overflow-y:auto;transition:right .3s ease}
#detail-panel.open{right:0}
.dp-close{position:sticky;top:0;background:#0a0a0a;padding:12px 16px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;z-index:1}
.dp-close button{background:none;border:none;color:#555;font-size:18px;cursor:pointer}
.dp-close button:hover{color:#fff}
.dp-body{padding:16px}
.dp-hero{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.dp-flag{font-size:28px}
.dp-name{font-size:18px;font-weight:800;color:#fff}
.dp-sub{font-size:11px;color:#555;margin-top:2px}
.dp-score-badge{margin-left:auto;font-size:18px;font-weight:800}
.dp-bars{margin-bottom:14px}
.dp-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dp-bar-label{font-size:10px;color:#444;width:52px;text-transform:uppercase;letter-spacing:.04em}
.dp-bar-track{flex:1;height:4px;background:#1a1a1a;border-radius:2px}
.dp-bar-fill{height:4px;border-radius:2px}
.dp-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:12px}
.dp-tag{padding:2px 7px;background:#111;border:1px solid #1a1a1a;border-radius:3px;font-size:9px;color:#555}
.dp-visa{font-size:11px;color:#444;margin-bottom:16px}
.save-btns{display:flex;gap:6px;margin-bottom:16px}
.save-btn{flex:1;padding:7px 4px;background:#111;border:1px solid #1e1e1e;border-radius:6px;color:#555;font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s}
.save-btn:hover{border-color:#333;color:#aaa}
.save-btn.on-wl{background:#1a0a0a;border-color:var(--red);color:var(--red)}
.save-btn.on-vi{background:#0a1a0a;border-color:#2ecc71;color:#2ecc71}
.save-btn.on-li{background:#0a0a1a;border-color:#3498db;color:#3498db}
.section-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#333;margin:14px 0 8px}
.review-item{padding:9px 0;border-bottom:1px solid #111}
.rev-header{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.rev-stars{color:#f39c12;font-size:11px}
.rev-user{font-size:10px;color:#444}
.rev-date{font-size:9px;color:#333;margin-left:auto}
.rev-text{font-size:12px;color:#888;line-height:1.5}
.rev-meta{font-size:10px;color:#333;margin-top:3px}
.add-form{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:12px;margin-top:10px}
.star-pick{display:flex;gap:3px;margin-bottom:8px}
.star-pick button{font-size:18px;cursor:pointer;color:#333;border:none;background:none;padding:0}
.star-pick button.lit{color:#f39c12}
.add-form textarea{width:100%;background:#111;border:1px solid #1e1e1e;border-radius:6px;color:#ccc;font-size:12px;padding:8px;resize:vertical;min-height:60px}
.add-form textarea:focus{border-color:var(--red);outline:none}
.add-form input{width:100%;padding:7px 10px;background:#111;border:1px solid #1e1e1e;border-radius:5px;color:#ccc;font-size:12px;margin-top:6px}
.add-form input:focus{border-color:var(--red);outline:none}
.add-form select{width:100%;padding:7px;background:#111;border:1px solid #1e1e1e;border-radius:5px;color:#aaa;font-size:12px;margin-top:6px}
.form-submit{width:100%;margin-top:8px;padding:8px;background:var(--red);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.form-submit:hover{background:#ff4444}
.tip-item{padding:8px 0;border-bottom:1px solid #111}
.tip-cat{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;text-transform:uppercase;background:#111;border:1px solid #1a1a1a;color:#444;margin-bottom:3px}
.tip-text{font-size:12px;color:#888}
.form-row{display:flex;gap:8px}
.form-row input{flex:1}
/* Sidebar tabs */
.sidebar-tabs{display:flex;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.sidebar-tab{flex:1;padding:10px;text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#333;cursor:pointer;border-bottom:2px solid transparent}
.sidebar-tab.on{color:var(--red);border-color:var(--red)}
.my-cities-panel{display:none;flex-direction:column;flex:1;overflow:hidden}
.my-cities-panel.open{display:flex}
.mc-tabs{display:flex;border-bottom:1px solid #1a1a1a;padding:0 14px}
.mc-tab{flex:1;padding:9px 4px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;color:#444;cursor:pointer;border-bottom:2px solid transparent}
.mc-tab.on{color:var(--red);border-color:var(--red)}
.mc-list{flex:1;overflow-y:auto;padding:10px 14px}
.mc-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #0d0d0d;cursor:pointer}
.mc-item:hover .mc-name{color:#fff}
.mc-name{font-size:13px;font-weight:600;color:#ccc}
.mc-country{font-size:10px;color:#444}
.mc-remove{margin-left:auto;background:none;border:none;color:#333;cursor:pointer;font-size:14px}
.mc-remove:hover{color:var(--red)}
.login-nudge{font-size:12px;color:#444;text-align:center;margin-top:8px}
.login-nudge button{background:none;border:none;color:var(--red);cursor:pointer;font-size:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0f0f0f;border:1px solid #222;border-radius:8px;padding:10px 18px;font-size:13px;color:#e0e0e0;z-index:9999;display:none;opacity:0;transition:opacity .2s}
.toast.show{display:block;opacity:1}

</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h2 id="authTitle">Join NomadMap</h2>
    <div class="auth-tabs">
      <div class="auth-tab on" data-tab="signup" onclick="switchAuthTab('signup')">Sign Up</div>
      <div class="auth-tab" data-tab="signin" onclick="switchAuthTab('signin')">Sign In</div>
    </div>
    <input type="email" id="authEmail" placeholder="Email address">
    <input type="password" id="authPassword" placeholder="Password">
    <button class="submit-btn" onclick="authSubmit()">Create Free Account</button>
    <p class="auth-msg" id="authMsg"></p>
  </div>
</div>
<div id="detail-panel">
  <div class="dp-close"><span style="font-size:13px;font-weight:600;color:#555">City Details</span><button onclick="closeDetail()">&#x2715;</button></div>
  <div class="dp-body" id="dp-body"></div>
</div>
<div class="toast" id="toast"></div>
<div id="app">
  <div id="topbar">
    <div class="logo">Nomad<span>Map</span></div>
    <input id="search" type="text" placeholder="🔍 Search cities...">
    <div class="user-widget" id="userWidget"></div>
    <div class="user-menu-dd" id="userMenuDD"></div>
    <div class="nomad-count" id="city-count">— cities</div>
    <div class="view-btns">
      <button class="view-btn active" id="btn-map" onclick="setView('map')">Map</button>
      <button class="view-btn" id="btn-list" onclick="setView('list')">List</button>
    </div>
  </div>

  <div id="sidebar">
    <div class="sidebar-tabs"><div class="sidebar-tab on" id="stab-explore" onclick="sidebarTab('explore')">Explore</div><div class="sidebar-tab" id="stab-mycities" onclick="sidebarTab('mycities')">My Cities</div></div>
    <div id="explore-panel" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div id="filters">
      <div class="filter-label">Filters</div>
      <div class="filter-row">
        <select id="f-region" onchange="applyFilters()">
          <option value="">All Regions</option>
          <option>Southeast Asia</option><option>East Asia</option>
          <option>Europe</option><option>Eastern Europe</option>
          <option>Latin America</option><option>North America</option>
          <option>Middle East</option><option>Africa</option>
          <option>Oceania</option>
        </select>
        <select id="f-cost" onchange="applyFilters()">
          <option value="">Any Budget</option>
          <option value="1000">Under $1k/mo</option>
          <option value="2000">Under $2k/mo</option>
          <option value="3000">Under $3k/mo</option>
        </select>
        <select id="f-sort" onchange="applyFilters()">
          <option value="score">Best Overall</option>
          <option value="cost">Cheapest First</option>
          <option value="internet">Fastest Internet</option>
          <option value="safety">Safest</option>
          <option value="weather">Best Weather</option>
        </select>
      </div>
      <div class="tag-filters" id="tag-filters"></div>
    </div>
    <div id="city-list"></div>
    </div>
    <div class="my-cities-panel" id="mc-panel">
      <div class="mc-tabs"><div class="mc-tab on" data-t="wishlist" onclick="mcTab(this,'wishlist')">Wishlist</div><div class="mc-tab" data-t="visited" onclick="mcTab(this,'visited')">Visited</div><div class="mc-tab" data-t="living" onclick="mcTab(this,'living')">Living</div></div>
      <div class="mc-list" id="mc-list"></div>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
  </div>

  <div id="list-view">
    <div class="list-grid" id="list-grid"></div>
  </div>
</div>

<script>

// Compute scores
CITIES.forEach(c => {
  const costScore = Math.max(0, 10 - (c.cost / 500));
  c.score = Math.round((costScore * 0.25 + c.internet/25 * 0.2 + c.safety * 0.25 + c.weather * 0.15 + c.fun * 0.15));
  c.score = Math.min(10, Math.max(1, c.score));
});

// Tags for filter buttons
const ALL_TAGS = ["beach","cheap","fast wifi","safe","tech","food","nightlife","culture","mountains","digital nomad visa"];

// State
let filtered = [...CITIES];
let activeCity = null;
let activeTag = null;
let currentView = 'map';
let markers = {};

// Map init
const map = L.map('map', {zoomControl:true}).setView([20, 15], 2);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap contributors © CARTO',
  subdomains:'abcd', maxZoom:19
}).addTo(map);

function scoreClass(s) {
  if(s >= 8) return 'score-great';
  if(s >= 6) return 'score-good';
  return 'score-ok';
}
function scoreColor(s) {
  if(s >= 8) return '#2ecc71';
  if(s >= 6) return '#f39c12';
  return '#e74c3c';
}
function barColor(val, max) {
  const pct = val / max;
  if(pct > 0.7) return '#2ecc71';
  if(pct > 0.4) return '#f39c12';
  return '#e74c3c';
}

function makeMarker(city) {
  const color = scoreColor(city.score);
  const icon = L.divIcon({
    className:'',
    html:`<div style="background:${color};width:10px;height:10px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);box-shadow:0 0 8px ${color}88;cursor:pointer;"></div>`,
    iconSize:[10,10], iconAnchor:[5,5], popupAnchor:[0,-8]
  });
  const m = L.marker([city.lat, city.lng], {icon}).addTo(map);
  m.bindPopup(buildPopup(city), {maxWidth:260, minWidth:240});
  m.on('click', () => selectCity(city.id));
  return m;
}

function buildPopup(c) {
  const tags = c.tags.slice(0,4).map(t=>`<span class="mp-tag">${t}</span>`).join('');
  return `<div class="map-popup">
    <div class="mp-name">${c.flag} ${c.name}</div>
    <div class="mp-country">${c.country} · ${c.region}</div>
    <div class="mp-grid">
      <div class="mp-stat"><div class="mp-stat-val" style="color:#f39c12">$${c.cost.toLocaleString()}</div><div class="mp-stat-label">/ month</div></div>
      <div class="mp-stat"><div class="mp-stat-val" style="color:#3498db">${c.internet}</div><div class="mp-stat-label">Mbps avg</div></div>
      <div class="mp-stat"><div class="mp-stat-val" style="color:#2ecc71">${c.safety}/10</div><div class="mp-stat-label">Safety</div></div>
      <div class="mp-stat"><div class="mp-stat-val" style="color:${scoreColor(c.score)}">${c.score}/10</div><div class="mp-stat-label">Overall</div></div>
    </div>
    <div class="mp-tags">${tags}</div>
    <div style="font-size:11px;color:#555;margin-top:8px;">Visa: ${c.visa}</div>
  </div>`;
}

function renderMarkers() {
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};
  filtered.forEach(c => { markers[c.id] = makeMarker(c); });
}

function renderList() {
  const el = document.getElementById('city-list');
  el.innerHTML = filtered.map(c => `
    <div class="city-card ${activeCity===c.id?'active':''}" onclick="selectCity('${c.id}')">
      <div class="city-flag">${c.flag}</div>
      <div class="city-info">
        <div class="city-name">${c.name}</div>
        <div class="city-country">${c.country}</div>
        <div class="city-stats">
          <div class="stat"><div class="stat-val" style="color:#f39c12">$${c.cost>=1000?(c.cost/1000).toFixed(1)+'k':c.cost}</div><div class="stat-label">/ mo</div></div>
          <div class="stat"><div class="stat-val" style="color:#3498db">${c.internet}</div><div class="stat-label">Mbps</div></div>
          <div class="stat"><div class="stat-val" style="color:#2ecc71">${c.safety}/10</div><div class="stat-label">Safety</div></div>
          <div class="stat"><div class="stat-val" style="color:#e67e22">${c.weather}/10</div><div class="stat-label">Weather</div></div>
        </div>
        <div class="city-tags">${c.tags.slice(0,3).map(t=>`<span class="city-tag">${t}</span>`).join('')}</div>
      </div>
      <div class="city-score ${scoreClass(c.score)}">${c.score}</div>
    </div>`).join('');
}

function renderListView() {
  const el = document.getElementById('list-grid');
  el.innerHTML = filtered.map(c => `
    <div class="list-card" onclick="selectCity('${c.id}')">
      <div class="lc-header">
        <div class="lc-flag">${c.flag}</div>
        <div><div class="lc-name">${c.name}</div><div class="lc-country">${c.country}</div></div>
        <div class="lc-score" style="color:${scoreColor(c.score)}">${c.score}</div>
      </div>
      <div class="lc-bars">
        <div class="bar-row"><div class="bar-label">Cost</div><div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,100-(c.cost/50))}%;background:${barColor(5000-c.cost,5000)}"></div></div><div style="font-size:11px;color:#555;width:60px;text-align:right">$${c.cost}/mo</div></div>
        <div class="bar-row"><div class="bar-label">Internet</div><div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,c.internet/2.5)}%;background:${barColor(c.internet,250)}"></div></div><div style="font-size:11px;color:#555;width:60px;text-align:right">${c.internet} Mbps</div></div>
        <div class="bar-row"><div class="bar-label">Safety</div><div class="bar-track"><div class="bar-fill" style="width:${c.safety*10}%;background:${barColor(c.safety,10)}"></div></div><div style="font-size:11px;color:#555;width:60px;text-align:right">${c.safety}/10</div></div>
        <div class="bar-row"><div class="bar-label">Weather</div><div class="bar-track"><div class="bar-fill" style="width:${c.weather*10}%;background:${barColor(c.weather,10)}"></div></div><div style="font-size:11px;color:#555;width:60px;text-align:right">${c.weather}/10</div></div>
      </div>
      <div class="lc-tags">${c.tags.slice(0,4).map(t=>`<span class="city-tag">${t}</span>`).join('')}</div>
    </div>`).join('');
}

function selectCity(id) {
  activeCity = id;
  const city = CITIES.find(c=>c.id===id);
  if(!city) return;
  renderList();
  if(currentView==='map') {
    map.flyTo([city.lat, city.lng], 10, {duration:1});
    setTimeout(()=>{ if(markers[id]) markers[id].openPopup(); }, 1000);
  }
  // Highlight sidebar item
  document.querySelectorAll('.city-card').forEach(el=>{
    el.classList.toggle('active', el.onclick?.toString().includes(id));
  });
}

function applyFilters() {
  const region = document.getElementById('f-region').value;
  const maxCost = parseInt(document.getElementById('f-cost').value)||999999;
  const sort = document.getElementById('f-sort').value;
  const search = document.getElementById('search').value.toLowerCase();

  filtered = CITIES.filter(c => {
    if(region && c.region !== region) return false;
    if(c.cost > maxCost) return false;
    if(activeTag && !c.tags.some(t=>t.includes(activeTag))) return false;
    if(search && !c.name.toLowerCase().includes(search) && !c.country.toLowerCase().includes(search)) return false;
    return true;
  });

  filtered.sort((a,b) => {
    if(sort==='cost') return a.cost-b.cost;
    if(sort==='internet') return b.internet-a.internet;
    if(sort==='safety') return b.safety-a.safety;
    if(sort==='weather') return b.weather-a.weather;
    return b.score-a.score;
  });

  document.getElementById('city-count').textContent = `${filtered.length} cities`;
  renderList();
  renderMarkers();
  if(currentView==='list') renderListView();
}

function setView(v) {
  currentView = v;
  document.getElementById('btn-map').classList.toggle('active', v==='map');
  document.getElementById('btn-list').classList.toggle('active', v==='list');
  document.getElementById('map-wrap').style.display = v==='map'?'':'none';
  document.getElementById('list-view').style.display = v==='list'?'block':'none';
  if(v==='list') { document.getElementById('list-view').style.display='block'; renderListView(); }
  if(v==='map') map.invalidateSize();
}

// Tag filter buttons
const tagContainer = document.getElementById('tag-filters');
ALL_TAGS.forEach(tag => {
  const btn = document.createElement('button');
  btn.className = 'tag-btn';
  btn.textContent = tag;
  btn.onclick = () => {
    activeTag = activeTag===tag?null:tag;
    document.querySelectorAll('.tag-btn').forEach(b=>b.classList.remove('active'));
    if(activeTag) btn.classList.add('active');
    applyFilters();
  };
  tagContainer.appendChild(btn);
});

// Search
document.getElementById('search').addEventListener('input', applyFilters);

// Init
applyFilters();

// Auth UI
var authMode = 'signup';
function showAuth() { document.getElementById('authOverlay').classList.add('open'); document.getElementById('authMsg').textContent = ''; }
function hideAuth() { document.getElementById('authOverlay').classList.remove('open'); }
document.getElementById('authOverlay').addEventListener('click', function(e) { if (e.target === e.currentTarget) hideAuth(); });

function switchAuthTab(m) {
  authMode = m;
  document.querySelectorAll('.auth-tab').forEach(function(t) { t.classList.toggle('on', t.dataset.tab === m); });
  document.getElementById('authTitle').textContent = m === 'signup' ? 'Join NomadMap' : 'Welcome Back';
  document.querySelector('.submit-btn').textContent = m === 'signup' ? 'Create Free Account' : 'Sign In';
  document.getElementById('authMsg').textContent = '';
}

async function authSubmit() {
  var email = document.getElementById('authEmail').value.trim();
  var pw = document.getElementById('authPassword').value;
  var msg = document.getElementById('authMsg');
  if (!email || !pw) { msg.textContent = 'Please fill all fields'; return; }
  msg.textContent = 'Loading...';
  try {
    var res;
    if (authMode === 'signup') {
      res = await sb.auth.signUp({ email: email, password: pw });
      if (res.error) throw res.error;
      msg.className = 'auth-msg ok'; msg.textContent = 'Account created! You can now save cities.';
      setTimeout(hideAuth, 1500);
    } else {
      res = await sb.auth.signInWithPassword({ email: email, password: pw });
      if (res.error) throw res.error;
      hideAuth();
    }
  } catch(e) { msg.className = 'auth-msg'; msg.textContent = e.message; }
}
document.getElementById('authPassword').addEventListener('keyup', function(e) { if (e.key === 'Enter') authSubmit(); });

// User widget
function onAuthChange() { renderUserWidget(); if (detailCity) refreshSaveBtns(detailCity.id); }
function renderUserWidget() {
  var w = document.getElementById('userWidget');
  if (!w) return;
  if (sbUser) {
    var ini = (sbUser.email[0] || 'U').toUpperCase();
    w.innerHTML = '<div class="user-avatar" onclick="toggleUM()" title="' + sbUser.email + '">' + ini + '</div>';
    document.getElementById('userMenuDD').innerHTML = '<a onclick="sidebarTab(&apos;mycities&apos;);toggleUM()">My Cities</a><a onclick="doSignOut()">Sign Out</a>';
  } else {
    w.innerHTML = '<button class="join-btn" onclick="showAuth()">Join Free</button>';
    document.getElementById('userMenuDD').innerHTML = '';
  }
}
function toggleUM() { document.getElementById('userMenuDD').classList.toggle('open'); }
document.addEventListener('click', function(e) { if (!e.target.closest('#userWidget') && !e.target.closest('#userMenuDD')) document.getElementById('userMenuDD').classList.remove('open'); });
async function doSignOut() { await sb.auth.signOut(); showToast('Signed out'); }

// Sidebar tabs
function sidebarTab(tab) {
  document.getElementById('stab-explore').classList.toggle('on', tab === 'explore');
  document.getElementById('stab-mycities').classList.toggle('on', tab === 'mycities');
  document.getElementById('explore-panel').style.display = tab === 'explore' ? 'flex' : 'none';
  document.getElementById('mc-panel').style.display = tab === 'mycities' ? 'flex' : 'none';
  if (tab === 'mycities') { if (!sbUser) { showAuth(); sidebarTab('explore'); return; } renderMyCities(); }
}

function mcTab(el, tab) {
  mcTab_ = tab;
  document.querySelectorAll('.mc-tab').forEach(function(t) { t.classList.remove('on'); });
  el.classList.add('on');
  renderMyCities();
}

// Saved cities
async function loadSaved() {
  if (!sbUser) { savedCities = {}; return; }
  var r = await sb.from('saved_cities').select('city_id,status').eq('user_id', sbUser.id);
  savedCities = {};
  (r.data || []).forEach(function(row) { savedCities[row.city_id] = row.status; });
  if (detailCity) refreshSaveBtns(detailCity.id);
}

async function toggleSave(cityId, cityName, status) {
  if (!sbUser) { showAuth(); return; }
  if (savedCities[cityId] === status) {
    await sb.from('saved_cities').delete().eq('user_id', sbUser.id).eq('city_id', cityId);
    delete savedCities[cityId]; showToast('Removed');
  } else {
    await sb.from('saved_cities').upsert({ user_id: sbUser.id, city_id: cityId, city_name: cityName, status: status }, { onConflict: 'user_id,city_id' });
    savedCities[cityId] = status;
    showToast(status === 'wishlist' ? 'Added to Wishlist' : status === 'visited' ? 'Marked Visited' : 'Set as Living Here');
  }
  refreshSaveBtns(cityId);
}

function refreshSaveBtns(cityId) {
  var st = savedCities[cityId];
  ['wishlist','visited','living'].forEach(function(s) {
    var b = document.getElementById('sb-' + s);
    if (b) b.className = 'save-btn' + (st === s ? ' on-' + s.substring(0,2) : '');
  });
}

async function renderMyCities() {
  if (!sbUser) return;
  var list = document.getElementById('mc-list');
  list.innerHTML = '<div style="color:#333;font-size:12px;padding:10px 0">Loading...</div>';
  var r = await sb.from('saved_cities').select('*').eq('user_id', sbUser.id).eq('status', mcTab_);
  if (!r.data || r.data.length === 0) { list.innerHTML = '<div style="color:#333;font-size:12px;padding:10px 0">None yet</div>'; return; }
  list.innerHTML = r.data.map(function(row) {
    var city = CITIES.find(function(c) { return c.id === row.city_id; }) || {};
    return '<div class="mc-item" onclick="selectCity(&apos;' + row.city_id + '&apos;);sidebarTab(&apos;explore&apos;)"><div style="font-size:18px">' + (city.flag || '') + '</div><div><div class="mc-name">' + row.city_name + '</div><div class="mc-country">' + (city.country || '') + '</div></div><button class="mc-remove" onclick="event.stopPropagation();removeSaved(&apos;' + row.city_id + '&apos;)" title="Remove">x</button></div>';
  }).join('');
}

async function removeSaved(cityId) {
  await sb.from('saved_cities').delete().eq('user_id', sbUser.id).eq('city_id', cityId);
  delete savedCities[cityId]; renderMyCities(); showToast('Removed');
}

// City detail panel
async function openDetail(cityId) {
  detailCity = CITIES.find(function(c) { return c.id === cityId; });
  if (!detailCity) return;
  document.getElementById('detail-panel').classList.add('open');
  var body = document.getElementById('dp-body');
  body.innerHTML = '<div style="color:#333;padding:20px;font-size:13px">Loading...</div>';
  
  var revP = sb.from('city_reviews').select('*').eq('city_id', cityId).order('created_at', { ascending: false }).limit(20);
  var tipP = sb.from('city_tips').select('*').eq('city_id', cityId).order('likes', { ascending: false }).limit(15);
  var results = await Promise.all([revP, tipP]);
  var reviews = results[0].data || [];
  var tips = results[1].data || [];
  var avgR = reviews.length ? (reviews.reduce(function(s, r) { return s + r.rating; }, 0) / reviews.length).toFixed(1) : null;
  var c = detailCity;
  var sc = c.score >= 8 ? '#2ecc71' : c.score >= 6 ? '#f39c12' : '#e74c3c';

  function bar(label, val, pct, color) {
    return '<div class="dp-bar-row"><div class="dp-bar-label">' + label + '</div><div class="dp-bar-track"><div class="dp-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div><div style="font-size:10px;color:#444;width:50px;text-align:right">' + val + '</div></div>';
  }

  var h = '<div class="dp-hero"><div class="dp-flag">' + c.flag + '</div><div><div class="dp-name">' + c.name + '</div><div class="dp-sub">' + c.country + ' &middot; ' + c.region + '</div></div><div class="dp-score-badge" style="color:' + sc + '">' + c.score + '/10</div></div>';
  h += '<div class="dp-bars">' + bar('Cost', '$' + c.cost + '/mo', Math.max(0, 100 - c.cost / 50), '#f39c12') + bar('Internet', c.internet + ' Mbps', Math.min(100, c.internet / 2.5), '#3498db') + bar('Safety', c.safety + '/10', c.safety * 10, '#2ecc71') + bar('Weather', c.weather + '/10', c.weather * 10, '#e67e22') + bar('Fun', c.fun + '/10', c.fun * 10, '#9b59b6') + '</div>';
  h += '<div class="dp-tags">' + c.tags.map(function(t) { return '<span class="dp-tag">' + t + '</span>'; }).join('') + '</div>';
  h += '<div class="dp-visa">Visa: ' + c.visa + '</div>';
  h += '<div class="save-btns"><button class="save-btn" id="sb-wishlist" onclick="toggleSave('' + c.id + '','' + c.name + '','wishlist')">&#9825; Wishlist</button><button class="save-btn" id="sb-visited" onclick="toggleSave('' + c.id + '','' + c.name + '','visited')">&#10003; Visited</button><button class="save-btn" id="sb-living" onclick="toggleSave('' + c.id + '','' + c.name + '','living')">&#127968; Living</button></div>';

  h += '<div class="section-title">Reviews ' + (reviews.length > 0 ? '(' + reviews.length + ') &middot; &#9733;' + avgR : '') + '</div>';
  if (reviews.length === 0) { h += '<div style="color:#333;font-size:12px;padding:6px 0">No reviews yet. Be the first!</div>'; }
  else {
    reviews.forEach(function(r) {
      h += '<div class="review-item"><div class="rev-header"><span class="rev-stars">' + '&#9733;'.repeat(r.rating) + '<span style="color:#333">' + '&#9733;'.repeat(5 - r.rating) + '</span></span><span class="rev-user">' + (r.reviewer_email || 'nomad') + '</span><span class="rev-date">' + new Date(r.created_at).toLocaleDateString() + '</span></div>';
      if (r.review) h += '<div class="rev-text">' + r.review + '</div>';
      if (r.cost_actual || r.internet_actual) h += '<div class="rev-meta">' + (r.cost_actual ? '$' + r.cost_actual + '/mo actual' : '') + (r.internet_actual ? ' &middot; ' + r.internet_actual + 'Mbps' : '') + '</div>';
      h += '</div>';
    });
  }

  if (sbUser) {
    h += '<div class="add-form"><div class="section-title" style="margin:0 0 8px">Write a Review</div><div class="star-pick" id="starPick">';
    for (var i = 1; i <= 5; i++) h += '<button data-n="' + i + '" onclick="setStars(' + i + ')">&#9733;</button>';
    h += '</div><textarea id="revText" placeholder="Your experience..."></textarea><div class="form-row"><input type="number" id="revCost" placeholder="Actual $/mo"><input type="number" id="revNet" placeholder="Actual Mbps"></div><button class="form-submit" onclick="submitReview()">Post Review</button></div>';
  } else {
    h += '<div class="login-nudge"><button onclick="showAuth()">Sign in</button> to write a review</div>';
  }

  h += '<div class="section-title" style="margin-top:16px">Tips (' + tips.length + ')</div>';
  if (tips.length === 0) h += '<div style="color:#333;font-size:12px;padding:6px 0">No tips yet.</div>';
  else tips.forEach(function(t) { h += '<div class="tip-item"><span class="tip-cat">' + t.category + '</span><div class="tip-text">' + t.tip + '</div></div>'; });

  if (sbUser) {
    h += '<div class="add-form"><div class="section-title" style="margin:0 0 8px">Add a Tip</div><textarea id="tipText" placeholder="Share a tip..."></textarea><select id="tipCat"><option value="general">General</option><option value="food">Food</option><option value="coworking">Coworking</option><option value="housing">Housing</option><option value="transport">Transport</option><option value="safety">Safety</option></select><button class="form-submit" style="margin-top:6px" onclick="submitTip()">Post Tip</button></div>';
  } else {
    h += '<div class="login-nudge"><button onclick="showAuth()">Sign in</button> to add a tip</div>';
  }

  body.innerHTML = h;
  refreshSaveBtns(cityId);
  reviewStars = 0;
}

function closeDetail() { document.getElementById('detail-panel').classList.remove('open'); detailCity = null; }

function setStars(n) {
  reviewStars = n;
  document.querySelectorAll('.star-pick button').forEach(function(b) { b.classList.toggle('lit', parseInt(b.dataset.n) <= n); });
}

async function submitReview() {
  if (!sbUser) { showAuth(); return; }
  if (!reviewStars) { showToast('Select a rating'); return; }
  var text = document.getElementById('revText').value.trim();
  var cost = parseInt(document.getElementById('revCost').value) || null;
  var inet = parseInt(document.getElementById('revNet').value) || null;
  var res = await sb.from('city_reviews').insert({ user_id: sbUser.id, city_id: detailCity.id, city_name: detailCity.name, rating: reviewStars, review: text || null, cost_actual: cost, internet_actual: inet, reviewer_email: sbUser.email.split('@')[0] });
  if (res.error) { showToast('Error: ' + res.error.message); return; }
  showToast('Review posted!'); openDetail(detailCity.id);
}

async function submitTip() {
  if (!sbUser) { showAuth(); return; }
  var tip = document.getElementById('tipText').value.trim();
  if (!tip) { showToast('Write a tip first'); return; }
  var cat = document.getElementById('tipCat').value;
  var res = await sb.from('city_tips').insert({ user_id: sbUser.id, city_id: detailCity.id, tip: tip, category: cat });
  if (res.error) { showToast('Error: ' + res.error.message); return; }
  showToast('Tip posted!'); openDetail(detailCity.id);
}

// Override selectCity to also open detail
var _origSelect = selectCity;
selectCity = function(id) { _origSelect(id); openDetail(id); };

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

renderUserWidget();

</script>
</body>
</html>
