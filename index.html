<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="version" content="2.4.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NomadMap — Find Your Next Base</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#ff2d2d;--bg:#080808;--surface:#0f0f0f;--border:#1a1a1a;--text:#e0e0e0;--muted:#555;--card:#0d0d0d;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:#222;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#333;}

/* Layout */
#app{display:grid;grid-template-rows:48px 1fr;grid-template-columns:340px 1fr;height:100vh;}
#topbar{grid-column:1/-1;grid-row:1;display:flex;align-items:center;gap:14px;padding:0 18px;background:rgba(8,8,8,0.98);border-bottom:1px solid var(--border);z-index:1000;backdrop-filter:blur(10px);}
#sidebar{grid-column:1;grid-row:2;overflow-y:auto;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
#map-wrap{grid-column:2;grid-row:2;position:relative;}
#map{width:100%;height:100%;}

/* Topbar */
.logo{font-size:17px;font-weight:800;letter-spacing:-0.03em;white-space:nowrap;color:#fff;}
.logo span{color:var(--red);}
#search{flex:1;max-width:360px;padding:8px 14px;background:#111;border:1px solid #222;border-radius:8px;color:#fff;font-size:13px;outline:none;transition:border-color .2s;}
#search::placeholder{color:#444;}
#search:focus{border-color:var(--red);box-shadow:0 0 0 2px rgba(255,45,45,0.1);}
.view-btns{display:flex;gap:4px;margin-left:auto;}
.view-btn{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;border:1px solid #222;background:transparent;color:#555;cursor:pointer;transition:all 0.2s;}
.view-btn:hover{color:#888;border-color:#333;}
.view-btn.active{background:var(--red);color:#fff;border-color:var(--red);}
.city-count{font-size:11px;color:#333;white-space:nowrap;font-weight:600;}

/* Sidebar tabs */
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-tab{flex:1;padding:11px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#333;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.sidebar-tab:hover{color:#555;}
.sidebar-tab.on{color:var(--red);border-color:var(--red);}

/* Filters */
#filters{padding:14px 16px;border-bottom:1px solid var(--border);}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.filter-row:last-child{margin-bottom:0;}
.filter-label{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#333;margin-bottom:6px;}
select{background:#111;border:1px solid #1e1e1e;color:#888;border-radius:5px;font-size:12px;padding:6px 8px;outline:none;cursor:pointer;transition:border-color .2s;}
select:focus{border-color:var(--red);}
.tag-filters{display:flex;gap:5px;flex-wrap:wrap;}
.tag-btn{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid #1e1e1e;background:transparent;color:#444;cursor:pointer;transition:all 0.2s;}
.tag-btn:hover{color:#666;border-color:#333;}
.tag-btn.active{border-color:var(--red);color:var(--red);background:rgba(255,45,45,0.05);}

/* City list */
#city-list{flex:1;overflow-y:auto;}
.city-card{padding:12px 16px;border-bottom:1px solid #0d0d0d;cursor:pointer;transition:all 0.15s;display:flex;gap:12px;align-items:flex-start;}
.city-card:hover{background:#111;}
.city-card.active{background:#110808;border-left:3px solid var(--red);padding-left:13px;}
.city-flag{font-size:20px;flex-shrink:0;margin-top:2px;}
.city-info{flex:1;min-width:0;}
.city-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#ddd;}
.city-country{font-size:10px;color:#444;margin-bottom:5px;}
.city-stats{display:flex;gap:10px;}
.stat{display:flex;flex-direction:column;align-items:center;}
.stat-val{font-size:11px;font-weight:700;}
.stat-label{font-size:8px;color:#333;text-transform:uppercase;letter-spacing:0.05em;}
.city-score{flex-shrink:0;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border:2px solid;}
.city-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
.city-tag{padding:2px 6px;border-radius:3px;font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;background:#111;color:#333;border:1px solid #1a1a1a;}

/* Score colors */
.score-great{color:#2ecc71;border-color:#2ecc71;}
.score-good{color:#f39c12;border-color:#f39c12;}
.score-ok{color:#e74c3c;border-color:#e74c3c;}

/* Map popup */
.map-popup{min-width:220px;}
.mp-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.mp-country{font-size:12px;color:#888;margin-bottom:10px;}
.mp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.mp-stat{background:#111;border-radius:6px;padding:8px;text-align:center;}
.mp-stat-val{font-size:16px;font-weight:800;}
.mp-stat-label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
.mp-tags{display:flex;gap:4px;flex-wrap:wrap;}
.mp-tag{padding:3px 8px;border-radius:3px;background:#0d0d0d;border:1px solid #222;font-size:10px;color:#666;}
.mp-btn{display:block;margin-top:10px;text-align:center;padding:8px;background:var(--red);color:#fff;border-radius:6px;font-size:12px;font-weight:700;text-decoration:none;cursor:pointer;border:none;width:100%;transition:background .2s;}
.mp-btn:hover{background:#ff4444;}

/* List view */
#list-view{display:none;grid-column:2;grid-row:2;overflow-y:auto;padding:24px;}
.list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.list-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all 0.25s;}
.list-card:hover{border-color:#333;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.lc-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.lc-flag{font-size:28px;}
.lc-score{margin-left:auto;font-size:22px;font-weight:800;}
.lc-name{font-size:16px;font-weight:700;}
.lc-country{font-size:12px;color:#555;}
.lc-bars{display:flex;flex-direction:column;gap:6px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-label{font-size:10px;color:#555;width:60px;text-transform:uppercase;letter-spacing:0.04em;}
.bar-track{flex:1;height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden;}
.bar-fill{height:4px;border-radius:2px;transition:width .4s ease;}
.lc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:12px;}

/* Leaflet overrides */
.leaflet-popup-content-wrapper{background:#0d0d0d!important;color:#e0e0e0!important;border:1px solid #222!important;border-radius:10px!important;box-shadow:0 8px 32px rgba(0,0,0,0.6)!important;}
.leaflet-popup-tip{background:#0d0d0d!important;}
.leaflet-popup-content{margin:14px!important;}
.leaflet-control-zoom{background:#111!important;border-color:#222!important;}
.leaflet-control-zoom a{background:#111!important;color:#fff!important;border-color:#222!important;}
.leaflet-control-attribution{background:rgba(0,0,0,0.6)!important;color:#333!important;font-size:9px!important;}
.leaflet-control-attribution a{color:#444!important;}

/* Auth */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9000;display:none;justify-content:center;align-items:center;backdrop-filter:blur(4px);}
.auth-overlay.open{display:flex;}
.auth-box{background:#0f0f0f;border:1px solid #222;border-radius:14px;padding:32px;width:380px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
.auth-box h2{color:#fff;text-align:center;font-size:18px;margin-bottom:20px;font-weight:800;}
.auth-tabs{display:flex;border-bottom:1px solid #1e1e1e;margin-bottom:20px;}
.auth-tab{flex:1;padding:10px;text-align:center;color:#444;cursor:pointer;font-size:13px;font-weight:600;border-bottom:2px solid transparent;transition:all .2s;}
.auth-tab.on{color:var(--red);border-color:var(--red);}
.auth-box input[type="email"],.auth-box input[type="password"]{width:100%;padding:12px 14px;margin-bottom:10px;background:#111;border:1px solid #1e1e1e;border-radius:8px;color:#e0e0e0;font-size:13px;transition:border-color .2s;}
.auth-box input:focus{border-color:var(--red);outline:none;box-shadow:0 0 0 2px rgba(255,45,45,0.1);}
.auth-box .submit-btn{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s;}
.auth-box .submit-btn:hover{background:#ff4444;}
.auth-msg{font-size:12px;text-align:center;margin-top:12px;color:var(--red);}
.auth-msg.ok{color:#2ecc71;}
.user-widget{display:flex;align-items:center;gap:8px;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--red);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;}
.user-avatar:hover{transform:scale(1.1);}
.user-menu-dd{position:absolute;top:44px;right:16px;background:#0f0f0f;border:1px solid #222;border-radius:10px;min-width:160px;display:none;padding:6px 0;z-index:9999;box-shadow:0 12px 40px rgba(0,0,0,0.5);}
.user-menu-dd.open{display:block;}
.user-menu-dd a{display:block;padding:10px 16px;font-size:12px;color:#aaa;cursor:pointer;text-decoration:none;transition:all .15s;}
.user-menu-dd a:hover{color:#fff;background:#111;}
.join-btn{padding:7px 16px;background:var(--red);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s;}
.join-btn:hover{background:#ff4444;}

/* City Modal */
#city-modal{position:fixed;inset:0;z-index:2000;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.88);backdrop-filter:blur(8px);}
#city-modal.open{display:flex;}
.cm-box{width:92vw;max-width:1000px;max-height:90vh;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:18px;display:grid;grid-template-columns:300px 1fr;overflow:hidden;box-shadow:0 32px 80px rgba(0,0,0,.7);animation:cmIn .25s ease;}
@keyframes cmIn{from{opacity:0;transform:scale(.96);}to{opacity:1;transform:scale(1);}}
.cm-hero{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;position:relative;border-right:1px solid #1a1a1a;}
.cm-hero-flag{font-size:72px;margin-bottom:16px;line-height:1;}
.cm-hero-name{font-size:28px;font-weight:900;color:#fff;text-align:center;letter-spacing:-0.03em;line-height:1.1;margin-bottom:6px;}
.cm-hero-sub{font-size:12px;color:rgba(255,255,255,.4);text-align:center;margin-bottom:28px;}
.cm-hero-score{font-size:80px;font-weight:900;letter-spacing:-0.04em;line-height:1;}
.cm-hero-score-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.15em;opacity:.4;margin-top:4px;}
.cm-details{overflow-y:auto;padding:28px 28px 28px 24px;position:relative;}
.cm-close{position:sticky;top:0;float:right;margin:-4px -4px 8px 8px;background:rgba(255,255,255,.07);border:none;color:#888;font-size:18px;cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:1;}
.cm-close:hover{background:rgba(255,255,255,.14);color:#fff;}
.cm-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;}
.cm-stat{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:12px;}
.cm-stat-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.cm-stat-icon{font-size:14px;}
.cm-stat-label{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.08em;font-weight:600;}
.cm-stat-val{font-size:20px;font-weight:800;margin-bottom:6px;}
.cm-bar{height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden;}
.cm-bar-fill{height:4px;border-radius:2px;transition:width .5s ease .1s;}
.cm-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px;}
.cm-tag{padding:4px 10px;background:#111;border:1px solid #1e1e1e;border-radius:20px;font-size:10px;font-weight:600;color:#555;}
.cm-visa{font-size:12px;color:#666;margin-bottom:16px;padding:10px 14px;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;}
.save-btns{display:flex;gap:6px;margin-bottom:20px;}
.save-btn{flex:1;padding:10px 4px;background:#111;border:1px solid #1e1e1e;border-radius:8px;color:#555;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;}
.save-btn:hover{border-color:#333;color:#888;}
.save-btn.on-wl{background:#1a0a0a;border-color:var(--red);color:var(--red);}
.save-btn.on-vi{background:#0a1a0a;border-color:#2ecc71;color:#2ecc71;}
.save-btn.on-li{background:#0a0a1a;border-color:#3498db;color:#3498db;}
.section-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#333;margin:18px 0 10px;display:flex;align-items:center;gap:6px;}
.review-item{padding:10px 0;border-bottom:1px solid #0f0f0f;}
.rev-header{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.rev-stars{color:#f39c12;font-size:11px;}
.rev-user{font-size:10px;color:#444;font-weight:600;}
.rev-date{font-size:9px;color:#333;margin-left:auto;}
.rev-text{font-size:12px;color:#888;line-height:1.6;}
.rev-meta{font-size:10px;color:#333;margin-top:3px;}
.add-form{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:10px;padding:14px;margin-top:10px;}
.star-pick{display:flex;gap:3px;margin-bottom:8px;}
.star-pick button{font-size:20px;cursor:pointer;color:#333;border:none;background:none;padding:0;transition:color .15s;}
.star-pick button.lit{color:#f39c12;}
.add-form textarea{width:100%;background:#111;border:1px solid #1e1e1e;border-radius:7px;color:#ccc;font-size:12px;padding:10px;resize:vertical;min-height:60px;font-family:inherit;transition:border-color .2s;}
.add-form textarea:focus{border-color:var(--red);outline:none;}
.add-form input[type="number"]{width:100%;padding:8px 10px;background:#111;border:1px solid #1e1e1e;border-radius:6px;color:#ccc;font-size:12px;margin-top:6px;transition:border-color .2s;}
.add-form input:focus{border-color:var(--red);outline:none;}
.add-form select{width:100%;padding:8px;background:#111;border:1px solid #1e1e1e;border-radius:6px;color:#aaa;font-size:12px;margin-top:6px;}
.form-submit{width:100%;margin-top:8px;padding:9px;background:var(--red);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:background .2s;}
.form-submit:hover{background:#ff4444;}
.tip-item{padding:8px 0;border-bottom:1px solid #0f0f0f;}
.tip-cat{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;background:#111;border:1px solid #1a1a1a;color:#444;margin-bottom:4px;}
.tip-text{font-size:12px;color:#888;line-height:1.5;}
.form-row{display:flex;gap:8px;}
.form-row input{flex:1;}
.login-nudge{font-size:12px;color:#444;text-align:center;margin-top:10px;}
.login-nudge button{background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;font-weight:600;}
@media(max-width:768px){.cm-box{grid-template-columns:1fr;grid-template-rows:auto 1fr;width:98vw;max-height:94vh;}.cm-hero{min-height:180px;padding:24px 20px;border-right:none;border-bottom:1px solid #1a1a1a;}.cm-hero-flag{font-size:48px;margin-bottom:10px;}.cm-hero-name{font-size:20px;}.cm-hero-score{font-size:52px;}.cm-details{padding:16px 18px;}}
/* My Cities panel */
.my-cities-panel{display:none;flex-direction:column;flex:1;overflow:hidden;}
.my-cities-panel.open{display:flex;}
.mc-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 14px;}
.mc-tab{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;color:#333;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.mc-tab:hover{color:#555;}
.mc-tab.on{color:var(--red);border-color:var(--red);}
#mc-list{flex:1;overflow-y:auto;padding:10px 14px;}
.mc-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #0d0d0d;cursor:pointer;transition:background .15s;}
.mc-item:hover{background:#111;border-radius:6px;padding:10px 6px;margin:0 -6px;}
.mc-item:hover .mc-name{color:#fff;}
.mc-name{font-size:13px;font-weight:600;color:#ccc;}
.mc-country{font-size:10px;color:#444;}
.mc-remove{margin-left:auto;background:none;border:none;color:#333;cursor:pointer;font-size:14px;padding:4px;transition:color .15s;}
.mc-remove:hover{color:var(--red);}

/* Leaderboard panel */
.lb-panel{display:none;flex-direction:column;flex:1;overflow:hidden;padding:14px 16px;}
.lb-panel.open{display:flex;}
.lb-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#333;margin-bottom:12px;}
.lb-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #0d0d0d;cursor:pointer;transition:background .15s;}
.lb-item:hover{background:#111;border-radius:6px;}
.lb-rank{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;background:#111;border:1px solid #222;color:#555;flex-shrink:0;}
.lb-rank.top3{background:var(--red);border-color:var(--red);color:#fff;}
.lb-name{font-size:13px;font-weight:600;color:#ccc;}
.lb-sub{font-size:10px;color:#444;}
.lb-count{margin-left:auto;font-size:11px;color:#444;font-weight:700;}
.lb-empty{color:#333;font-size:12px;padding:20px 0;text-align:center;}

.login-nudge{font-size:12px;color:#444;text-align:center;margin-top:10px;}
.login-nudge button{background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;font-weight:600;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#0f0f0f;border:1px solid #222;border-radius:10px;padding:10px 20px;font-size:13px;color:#e0e0e0;z-index:9999;display:none;opacity:0;transition:all .3s ease;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.toast.show{display:block;opacity:1;transform:translateX(-50%) translateY(0);}

/* Mobile */
@media(max-width:768px){
  #app{grid-template-columns:1fr;grid-template-rows:48px auto 1fr;}
  #sidebar{grid-row:2;grid-column:1;max-height:40vh;}
  #map-wrap{grid-row:3;grid-column:1;}
  #list-view{grid-column:1;grid-row:3;}
  .list-grid{grid-template-columns:1fr;}
}
@media(max-width:480px){
  #topbar{gap:8px;padding:0 10px;}
  #search{max-width:160px;font-size:12px;padding:6px 10px;}
  .logo{font-size:14px;}
  .view-btn{padding:5px 10px;font-size:10px;}
}

/* === NomadMap 2.3.0 Sprint 1 CSS === */
.rand-btn{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:0.04em;border:1px solid #333;background:#111;color:#888;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.rand-btn:hover{color:#fff;border-color:var(--red);background:#1a0808;}

.cm-costs{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.cm-cost-row{flex:1;min-width:80px;background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:10px 12px;text-align:center;}
.cm-cost-row .cost-val{font-size:18px;font-weight:800;color:#f39c12;}
.cm-cost-row .cost-label{font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.08em;margin-top:3px;}

.cm-pros,.cm-cons{display:flex;flex-direction:column;gap:5px;margin-bottom:8px;}
.cm-pro,.cm-con{display:flex;align-items:flex-start;gap:7px;font-size:12px;line-height:1.5;}
.cm-pro{color:#aaffaa;}
.cm-con{color:#ffaaaa;}
.cm-pro::before{content:"\2713";color:#2ecc71;font-weight:800;flex-shrink:0;}
.cm-con::before{content:"\2717";color:#e74c3c;font-weight:800;flex-shrink:0;}

function scoreClass(s){return s>=8?"score-great":s>=6?"score-good":"score-ok";}
function scoreColor(s){return s>=8?"#2ecc71":s>=6?"#f39c12":"#e74c3c";}
function barColor(v,m){var p=v/m;return p>0.7?"#2ecc71":p>0.4?"#f39c12":"#e74c3c";}
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}
function showNudge(msg,btnText,cb){var t=document.getElementById("toast");t.innerHTML=esc(msg)+' <button style="background:none;border:none;color:var(--red);cursor:pointer;font-weight:700;font-size:12px;margin-left:6px;text-decoration:underline;" id="nudgeBtn">'+esc(btnText)+'</button>';t.classList.add("show");var nb=document.getElementById("nudgeBtn");if(nb)nb.addEventListener("click",function(){t.classList.remove("show");cb();});setTimeout(function(){t.classList.remove("show");},7000);}

// Markers with review count scaling
function markerSize(id){var c=reviewCounts[id]||0;return 10+Math.min(c*2,16);}
function makeMarker(city){var color=scoreColor(city.score),size=markerSize(city.id);var nc=(nomadsByCity[city.id]||{}).count||0;var badge=nc>0?'<div class="nomad-badge">'+nc+'</div>':'';
var outer=size+8;var icon=L.divIcon({className:"",html:'<div style="position:relative;width:'+outer+'px;height:'+outer+'px;display:flex;align-items:center;justify-content:center;"><div style="background:'+color+';width:'+size+'px;height:'+size+'px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);box-shadow:0 0 10px '+color+'66;cursor:pointer;transition:transform .15s;" onmouseenter="this.style.transform=\'scale(1.3)\'" onmouseleave="this.style.transform=\'scale(1)\'">&nbsp;</div>'+badge+'</div>',iconSize:[outer,outer],iconAnchor:[outer/2,outer/2],popupAnchor:[0,-outer/2]});var m=L.marker([city.lat,city.lng],{icon:icon}).addTo(map);m.bindPopup(buildPopup(city),{maxWidth:280,minWidth:240});m.on("click",function(){selectCity(city.id);});return m;}
function buildPopup(c){var tags=c.tags.slice(0,4).map(function(t){return'<span class="mp-tag">'+esc(t)+"</span>";}).join(""),rc=reviewCounts[c.id]||0;return'<div class="map-popup"><div class="mp-name">'+c.flag+" "+esc(c.name)+'</div><div class="mp-country">'+esc(c.country)+" \u00b7 "+esc(c.region)+(rc?" \u00b7 "+rc+" reviews":"")+'</div><div class="mp-grid"><div class="mp-stat"><div class="mp-stat-val" style="color:#f39c12">$'+c.cost.toLocaleString()+'</div><div class="mp-stat-label">/ month</div></div><div class="mp-stat"><div class="mp-stat-val" style="color:#3498db">'+c.internet+'</div><div class="mp-stat-label">Mbps avg</div></div><div class="mp-stat"><div class="mp-stat-val" style="color:#2ecc71">'+c.safety+'/10</div><div class="mp-stat-label">Safety</div></div><div class="mp-stat"><div class="mp-stat-val" style="color:'+scoreColor(c.score)+'">'+c.score+'/10</div><div class="mp-stat-label">Overall</div></div></div><div class="mp-tags">'+tags+'</div><div style="font-size:11px;color:#555;margin-top:8px;">Visa: '+esc(c.visa)+'</div><button class="mp-btn" data-city="'+c.id+'">View Details</button></div>';}

function bindDetailEvents(city){var body=document.getElementById("cm-body");body.querySelectorAll(".save-btn[data-save]").forEach(function(btn){btn.addEventListener("click",function(){toggleSave(city.id,city.name,btn.dataset.save);});});var sp=document.getElementById("starPick");if(sp)sp.addEventListener("click",function(e){var btn=e.target.closest("button");if(!btn)return;reviewStars=parseInt(btn.dataset.n);sp.querySelectorAll("button").forEach(function(b){b.classList.toggle("lit",parseInt(b.dataset.n)<=reviewStars);});});var sr=document.getElementById("submitReviewBtn");if(sr)sr.addEventListener("click",async function(){if(!sbUser){showAuth();return;}if(!reviewStars){showToast("Select a rating");return;}var text=document.getElementById("revText").value.trim(),cost=parseInt(document.getElementById("revCost").value)||null,inet=parseInt(document.getElementById("revNet").value)||null;sr.textContent="Posting...";sr.disabled=true;var res=await sb.from("city_reviews").insert({user_id:sbUser.id,city_id:city.id,city_name:city.name,rating:reviewStars,review:text||null,cost_actual:cost,internet_actual:inet,reviewer_email:sbUser.email.split("@")[0]});if(res.error){showToast("Error: "+res.error.message);sr.textContent="Post Review";sr.disabled=false;return;}showToast("Review posted!");reviewCounts[city.id]=(reviewCounts[city.id]||0)+1;renderMarkers();openDetail(city.id);});var st=document.getElementById("submitTipBtn");if(st)st.addEventListener("click",async function(){if(!sbUser){showAuth();return;}var tip=document.getElementById("tipText").value.trim();if(!tip){showToast("Write a tip first");return;}var cat=document.getElementById("tipCat").value;st.textContent="Posting...";st.disabled=true;var res=await sb.from("city_tips").insert({user_id:sbUser.id,city_id:city.id,tip:tip,category:cat});if(res.error){showToast("Error: "+res.error.message);st.textContent="Post Tip";st.disabled=false;return;}showToast("Tip posted!");openDetail(city.id);});var lr=document.getElementById("loginForReview");if(lr)lr.addEventListener("click",showAuth);var lt=document.getElementById("loginForTip");if(lt)lt.addEventListener("click",showAuth);}

function toggleCompare(cityId){
  var idx=compareList.indexOf(cityId);
  if(idx!==-1){compareList.splice(idx,1);showToast("Removed from compare");}
  else if(compareList.length>=3){showToast("Max 3 cities to compare");return;}
  else{compareList.push(cityId);showToast("Added to compare");}
}
function openCompare(){
  if(compareList.length===0){showToast("Add cities to compare first");return;}
  var modal=document.getElementById("compare-modal");
  modal.classList.add("open");
  renderCompare();
}
function closeCompare(){document.getElementById("compare-modal").classList.remove("open");}
function renderCompare(){
  var cities=compareList.map(function(id){return CITIES.find(function(c){return c.id===id;});}).filter(Boolean);
  var body=document.getElementById("cmpBody");
  if(!cities.length){body.innerHTML='<div class="cmp-empty">No cities selected.<div class="cmp-add-hint">Open a city modal and click &quot;+ Compare This City&quot;</div></div>';return;}
  var metrics=[
    {k:"cost",label:"Monthly Cost",fmt:function(c){return"$"+c.cost.toLocaleString()+"/mo";},best:"min"},
    {k:"rent",label:"Rent (1BR)",fmt:function(c){return c.rent?"$"+c.rent+"/mo":"--";},best:"min"},
    {k:"food",label:"Food Budget",fmt:function(c){return c.food?"$"+c.food+"/mo":"--";},best:"min"},
    {k:"beer",label:"Beer Price",fmt:function(c){return c.beer?"$"+c.beer:"--";},best:"min"},
    {k:"internet",label:"Internet Speed",fmt:function(c){return c.internet+" Mbps";},best:"max"},
    {k:"safety",label:"Safety",fmt:function(c){return c.safety+"/10";},best:"max"},
    {k:"weather",label:"Weather",fmt:function(c){return c.weather+"/10";},best:"max"},
    {k:"fun",label:"Fun",fmt:function(c){return c.fun+"/10";},best:"max"},
    {k:"walk",label:"Walkability",fmt:function(c){return c.walk?c.walk+"/10":"--";},best:"max"},
    {k:"womenSafe",label:"Female Safety",fmt:function(c){return c.womenSafe?c.womenSafe+"/10":"--";},best:"max"},
    {k:"lgbtq",label:"LGBTQ+",fmt:function(c){return c.lgbtq?c.lgbtq+"/10":"--";},best:"max"},
    {k:"english",label:"English",fmt:function(c){return c.english?c.english+"/10":"--";},best:"max"},
    {k:"cowork",label:"Coworking",fmt:function(c){return c.cowork?c.cowork+"/10":"--";},best:"max"},
    {k:"healthcare",label:"Healthcare",fmt:function(c){return c.healthcare?c.healthcare+"/10":"--";},best:"max"},
    {k:"airQ",label:"Air Quality",fmt:function(c){return c.airQ?c.airQ+"/10":"--";},best:"max"},
    {k:"humidity",label:"Humidity",fmt:function(c){return c.humidity?c.humidity+"%":"--";},best:"none"},
    {k:"avgStay",label:"Avg Stay",fmt:function(c){return c.avgStay?c.avgStay+" days":"--";},best:"max"},
    {k:"score",label:"Overall Score",fmt:function(c){return c.score+"/10";},best:"max"},
  ];
  var h='<table class="cmp-table"><thead><tr><th style="text-align:left;color:#444;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;">Metric</th>';
  cities.forEach(function(c){h+='<th><span class="cmp-city-flag">'+c.flag+'</span><div class="cmp-city-name">'+esc(c.name)+'</div><div style="font-size:11px;color:#555;margin-top:2px;">'+esc(c.country)+'</div></th>';});
  h+='</tr></thead><tbody>';
  metrics.forEach(function(m){
    h+='<tr><td class="cmp-metric">'+m.label+'</td>';
    var vals=cities.map(function(c){return c[m.k]!==undefined&&c[m.k]!==null?c[m.k]:null;});
    var nonNull=vals.filter(function(v){return v!==null;});
    var bestVal=null;
    if(nonNull.length>0){
      if(m.best==="min")bestVal=Math.min.apply(null,nonNull);
      else if(m.best==="max")bestVal=Math.max.apply(null,nonNull);
    }
    cities.forEach(function(c){
      var val=c[m.k]!==undefined?c[m.k]:null;
      var isBest=m.best!=="none"&&val!==null&&val===bestVal;
      h+='<td class="cmp-val'+(isBest?" best":"")+'">'+m.fmt(c)+'</td>';
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  body.innerHTML=h;
}
document.getElementById("cmpCloseBtn").addEventListener("click",closeCompare);
document.getElementById("cmpClearBtn").addEventListener("click",function(){compareList=[];closeCompare();showToast("Compare list cleared");});

document.getElementById("surpriseBtn").addEventListener("click",function(){
  var good=CITIES.filter(function(c){return c.score>=7;});

  var pick=good[Math.floor(Math.random()*good.length)];
  selectCity(pick.id);
  if(currentView==="map"){map.flyTo([pick.lat,pick.lng],10,{duration:1.2});}

});

// Wire up compare button in detail modal (event delegation on cm-body)
document.getElementById("cm-body").addEventListener("click",function(e){
  var btn=e.target.closest("#cmpAddBtn");
  if(btn&&detailCity){
    toggleCompare(detailCity.id);
    var inCmp=compareList.indexOf(detailCity.id)!==-1;
    btn.textContent=inCmp?"✓ In Comparison":"+ Compare This City";
    btn.className="cm-compare-btn"+(inCmp?" in-compare":"");
    var existingViewBtn=document.getElementById("viewCompareBtn");
    if(compareList.length>=2){
      if(!existingViewBtn){
        var viewBtn=document.createElement("button");
        viewBtn.id="viewCompareBtn";
        viewBtn.className="cm-compare-btn in-compare";
        viewBtn.style.marginTop="6px";
        viewBtn.textContent="\uD83D\uDCCA View Comparison ("+compareList.length+")";
        viewBtn.addEventListener("click",openCompare);
        btn.parentNode.insertBefore(viewBtn,btn.nextSibling);
      } else {
        existingViewBtn.textContent="\uD83D\uDCCA View Comparison ("+compareList.length+")";
      }
    } else if(existingViewBtn){
      existingViewBtn.remove();
    }
  }
});

async function loadNomadProfiles(){
  try{
    var r=await sb.from("nomad_profiles").select("current_city,username").not("current_city","is",null);
    nomadsByCity={};
    if(r.data){
      r.data.forEach(function(row){
        if(!row.current_city)return;
        var cid=row.current_city;
        if(!nomadsByCity[cid])nomadsByCity[cid]={count:0,usernames:[]};
        nomadsByCity[cid].count++;
        if(row.username)nomadsByCity[cid].usernames.push(row.username);
      });
    }
    renderMarkers();
    renderList();
  }catch(e){}
}

function avatarColor(str){var colors=["#e74c3c","#3498db","#2ecc71","#f39c12","#9b59b6","#1abc9c","#e67e22","#e91e63"];var h=0;var s=str||"?";for(var i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))>>>0;return colors[h%colors.length];}
function avatarInitials(username,email){var u=username||(email?email.split("@")[0]:"?");return(u[0]||"?").toUpperCase();}

async function openProfilePanel(){
  var pc=document.getElementById("profile-content");
  if(!sbUser){
    pc.innerHTML='<div class="profile-not-logged"><p>Sign in to create your nomad profile</p><button onclick="showAuth()">Sign In / Join Free</button></div>';
    return;
  }
  pc.innerHTML='<div style="color:#333;font-size:12px;padding:16px;text-align:center">Loading...</div>';
  try{
    var profRes=await sb.from("nomad_profiles").select("*").eq("user_id",sbUser.id).maybeSingle();
    var tripsRes=await sb.from("trips").select("*").eq("user_id",sbUser.id).order("start_date",{ascending:false});
    renderProfilePanel(profRes.data||{},tripsRes.data||[]);
  }catch(e){document.getElementById("profile-content").innerHTML='<div style="color:#555;font-size:12px;padding:16px;text-align:center">Error loading profile.</div>';}
}

function renderProfilePanel(prof,trips){
  var pc=document.getElementById("profile-content");
  var ini=avatarInitials(prof.username,sbUser.email);
  var col=avatarColor(prof.username||sbUser.email||"x");
  var cityOpts='<option value="">--- None ---</option>'+CITIES.map(function(c){return'<option value="'+c.id+'"'+(prof.current_city===c.id?' selected':'')+'>'+c.flag+' '+esc(c.name)+'</option>';}).join('');
  var tripOpts='<option value="">Select city...</option>'+CITIES.map(function(c){return'<option value="'+c.id+'">'+c.flag+' '+esc(c.name)+'</option>';}).join('');
  var h='';
  h+='<div class="profile-header"><div class="profile-avatar-circle" id="profAvatar" style="background:'+col+'">'+ini+'</div>';
  h+='<div><div style="font-size:13px;font-weight:700;color:#ccc">'+esc(prof.username||sbUser.email.split('@')[0])+'</div>';
  h+='<div style="font-size:10px;color:#444">'+esc(sbUser.email)+'</div></div></div>';
  h+='<div class="profile-form">';
  h+='<div class="profile-field"><label>Username</label><input type="text" id="pf-username" value="'+esc(prof.username||'')+'" placeholder="your_name" maxlength="30"></div>';
  h+='<div class="profile-field"><label>Bio <span id="bio-count" style="font-weight:400;color:#333">('+((prof.bio||'').length)+'/160)</span></label>';
  h+='<textarea id="pf-bio" maxlength="160" placeholder="Remote worker. World explorer...">'+esc(prof.bio||'')+'</textarea></div>';
  h+='<div class="profile-field"><label>Home Country</label><input type="text" id="pf-country" value="'+esc(prof.home_country||'')+'" placeholder="USA, Germany..."></div>';
  h+='<div class="profile-field"><label>Currently In</label><select id="pf-city">'+cityOpts+'</select></div>';
  h+='<div class="profile-field"><label>Remote Work Type</label><select id="pf-work"><option value="">Select...</option>';
  h+='<option value="Freelancer"'+(prof.remote_work==='Freelancer'?' selected':'')+'>Freelancer</option>';
  h+='<option value="Remote Employee"'+(prof.remote_work==='Remote Employee'?' selected':'')+'>Remote Employee</option>';
  h+='<option value="Founder"'+(prof.remote_work==='Founder'?' selected':'')+'>Founder</option>';
  h+='<option value="Other"'+(prof.remote_work==='Other'?' selected':'')+'>Other</option>';
  h+='</select></div>';
  h+='<button class="profile-save-btn" id="profileSaveBtn">Save Profile</button></div>';
  h+='<div style="padding:0 16px 20px">';
  h+='<div class="section-title" style="margin-top:16px">&#9992;&#65039; Trips Log</div>';
  h+='<div id="trips-list"></div>';
  h+='<div class="add-trip-form"><div class="section-title" style="margin:0 0 4px">+ Log a Trip</div>';
  h+='<select id="trip-city">'+tripOpts+'</select>';
  h+='<input type="date" id="trip-start">';
  h+='<input type="date" id="trip-end">';
  h+='<textarea id="trip-notes" placeholder="What was it like?"></textarea>';
  h+='<button class="form-submit" id="logTripBtn" style="margin-top:8px">Log Trip</button>';
  h+='</div></div>';
  pc.innerHTML=h;
  renderTrips(trips);
  document.getElementById("profileSaveBtn").addEventListener("click",saveProfile);
  document.getElementById("logTripBtn").addEventListener("click",addTrip);
  var bioField=document.getElementById("pf-bio");
  if(bioField)bioField.addEventListener("input",function(){var bc=document.getElementById("bio-count");if(bc)bc.textContent="("+this.value.length+"/160)";});

function renderTrips(trips){
  var el=document.getElementById("trips-list");
  if(!el)return;
  if(!trips||trips.length===0){el.innerHTML='<div style="color:#333;font-size:12px;padding:8px 0">No trips logged yet.</div>';return;}
  var mn=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function fmtD(d){if(!d)return null;var p=d.split("-");return mn[parseInt(p[1])-1]+" "+p[0];}
  function dur(s,e){if(!s)return"";if(!e)return"Ongoing";var ms=new Date(e)-new Date(s);return Math.round(ms/86400000)+" days";}
  el.innerHTML=trips.map(function(t){
    var city=CITIES.find(function(c){return c.id===t.city_id;})||{};
    var dateStr=(t.start_date?fmtD(t.start_date):"?")+" \u2013 "+(t.end_date?fmtD(t.end_date):"Present");
    return'<div class="trip-item"><div style="font-size:20px;flex-shrink:0">'+(city.flag||"&#127758;")+'</div>'+
      '<div style="flex:1;min-width:0"><div class="trip-city">'+esc(t.city_name||city.name||t.city_id)+'</div>'+
      '<div class="trip-meta">'+dateStr+' &middot; '+dur(t.start_date,t.end_date)+'</div>'+
      (t.notes?'<div style="font-size:11px;color:#333;margin-top:2px">'+esc(t.notes)+'</div>':'')+
      '</div><button class="trip-delete" data-tripid="'+t.id+'">&times;</button></div>';
  }).join('');
  el.querySelectorAll(".trip-delete").forEach(function(btn){
    btn.addEventListener("click",function(e){e.stopPropagation();deleteTrip(btn.dataset.tripid);});
  });
}

async function saveProfile(){
  var btn=document.getElementById("profileSaveBtn");
  if(!btn)return;
  btn.textContent="Saving...";btn.disabled=true;
  var username=(document.getElementById("pf-username")||{}).value||"";
  var bio=(document.getElementById("pf-bio")||{}).value||"";
  var homeCountry=(document.getElementById("pf-country")||{}).value||"";
  var currentCity=(document.getElementById("pf-city")||{}).value||"";
  var remoteWork=(document.getElementById("pf-work")||{}).value||"";
  var res=await sb.from("nomad_profiles").upsert({
    user_id:sbUser.id,
    username:username.trim()||null,
    bio:bio.trim()||null,
    home_country:homeCountry.trim()||null,
    current_city:currentCity||null,
    remote_work:remoteWork||null
  },{onConflict:"user_id"});
  btn.textContent="Save Profile";btn.disabled=false;
  if(res.error){showToast("Error: "+res.error.message);return;}
  showToast("Profile saved!");
  var ini=avatarInitials(username.trim(),sbUser.email);
  var col=avatarColor(username.trim()||sbUser.email||"x");
  var av=document.getElementById("profAvatar");
  if(av){av.textContent=ini;av.style.background=col;}
  loadNomadProfiles();
}

async function addTrip(){
  var btn=document.getElementById("logTripBtn");
  var cityId=(document.getElementById("trip-city")||{}).value||"";
  var startDate=(document.getElementById("trip-start")||{}).value||"";
  var endDate=(document.getElementById("trip-end")||{}).value||"";
  var notes=(document.getElementById("trip-notes")||{}).value||"";
  if(!cityId){showToast("Select a city");return;}
  if(!startDate){showToast("Set a start date");return;}
  var city=CITIES.find(function(c){return c.id===cityId;});
  btn.textContent="Logging...";btn.disabled=true;
  var res=await sb.from("trips").insert({
    user_id:sbUser.id,city_id:cityId,
    city_name:city?city.name:cityId,
    start_date:startDate,
    end_date:endDate||null,
    notes:notes.trim()||null
  });
  btn.textContent="Log Trip";btn.disabled=false;
  if(res.error){showToast("Error: "+res.error.message);return;}
  showToast("Trip logged!");
  document.getElementById("trip-start").value="";
  document.getElementById("trip-end").value="";
  document.getElementById("trip-notes").value="";
  var r=await sb.from("trips").select("*").eq("user_id",sbUser.id).order("start_date",{ascending:false});
  renderTrips(r.data||[]);
}

async function deleteTrip(tripId){
  var res=await sb.from("trips").delete().eq("id",tripId).eq("user_id",sbUser.id);
  if(res.error){showToast("Error");return;}
  showToast("Trip removed");
  var r=await sb.from("trips").select("*").eq("user_id",sbUser.id).order("start_date",{ascending:false});
  renderTrips(r.data||[]);
}
