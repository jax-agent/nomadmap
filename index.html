<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="version" content="2.1.0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NomadMap — Find Your Next Base</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#ff2d2d;--bg:#080808;--surface:#0f0f0f;--border:#1a1a1a;--text:#e0e0e0;--muted:#555;--card:#0d0d0d;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:var(--surface);}
::-webkit-scrollbar-thumb{background:#222;border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:#333;}

/* Layout */
#app{display:grid;grid-template-rows:48px 1fr;grid-template-columns:340px 1fr;height:100vh;}
#topbar{grid-column:1/-1;grid-row:1;display:flex;align-items:center;gap:14px;padding:0 18px;background:rgba(8,8,8,0.98);border-bottom:1px solid var(--border);z-index:1000;backdrop-filter:blur(10px);}
#sidebar{grid-column:1;grid-row:2;overflow-y:auto;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;}
#map-wrap{grid-column:2;grid-row:2;position:relative;}
#map{width:100%;height:100%;}

/* Topbar */
.logo{font-size:17px;font-weight:800;letter-spacing:-0.03em;white-space:nowrap;color:#fff;}
.logo span{color:var(--red);}
#search{flex:1;max-width:360px;padding:8px 14px;background:#111;border:1px solid #222;border-radius:8px;color:#fff;font-size:13px;outline:none;transition:border-color .2s;}
#search::placeholder{color:#444;}
#search:focus{border-color:var(--red);box-shadow:0 0 0 2px rgba(255,45,45,0.1);}
.view-btns{display:flex;gap:4px;margin-left:auto;}
.view-btn{padding:6px 14px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;border:1px solid #222;background:transparent;color:#555;cursor:pointer;transition:all 0.2s;}
.view-btn:hover{color:#888;border-color:#333;}
.view-btn.active{background:var(--red);color:#fff;border-color:var(--red);}
.city-count{font-size:11px;color:#333;white-space:nowrap;font-weight:600;}

/* Sidebar tabs */
.sidebar-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.sidebar-tab{flex:1;padding:11px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#333;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.sidebar-tab:hover{color:#555;}
.sidebar-tab.on{color:var(--red);border-color:var(--red);}

/* Filters */
#filters{padding:14px 16px;border-bottom:1px solid var(--border);}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;}
.filter-row:last-child{margin-bottom:0;}
.filter-label{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#333;margin-bottom:6px;}
select{background:#111;border:1px solid #1e1e1e;color:#888;border-radius:5px;font-size:12px;padding:6px 8px;outline:none;cursor:pointer;transition:border-color .2s;}
select:focus{border-color:var(--red);}
.tag-filters{display:flex;gap:5px;flex-wrap:wrap;}
.tag-btn{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;border:1px solid #1e1e1e;background:transparent;color:#444;cursor:pointer;transition:all 0.2s;}
.tag-btn:hover{color:#666;border-color:#333;}
.tag-btn.active{border-color:var(--red);color:var(--red);background:rgba(255,45,45,0.05);}

/* City list */
#city-list{flex:1;overflow-y:auto;}
.city-card{padding:12px 16px;border-bottom:1px solid #0d0d0d;cursor:pointer;transition:all 0.15s;display:flex;gap:12px;align-items:flex-start;}
.city-card:hover{background:#111;}
.city-card.active{background:#110808;border-left:3px solid var(--red);padding-left:13px;}
.city-flag{font-size:20px;flex-shrink:0;margin-top:2px;}
.city-info{flex:1;min-width:0;}
.city-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#ddd;}
.city-country{font-size:10px;color:#444;margin-bottom:5px;}
.city-stats{display:flex;gap:10px;}
.stat{display:flex;flex-direction:column;align-items:center;}
.stat-val{font-size:11px;font-weight:700;}
.stat-label{font-size:8px;color:#333;text-transform:uppercase;letter-spacing:0.05em;}
.city-score{flex-shrink:0;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border:2px solid;}
.city-tags{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px;}
.city-tag{padding:2px 6px;border-radius:3px;font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;background:#111;color:#333;border:1px solid #1a1a1a;}

/* Score colors */
.score-great{color:#2ecc71;border-color:#2ecc71;}
.score-good{color:#f39c12;border-color:#f39c12;}
.score-ok{color:#e74c3c;border-color:#e74c3c;}

/* Map popup */
.map-popup{min-width:220px;}
.mp-name{font-size:15px;font-weight:700;margin-bottom:2px;}
.mp-country{font-size:12px;color:#888;margin-bottom:10px;}
.mp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.mp-stat{background:#111;border-radius:6px;padding:8px;text-align:center;}
.mp-stat-val{font-size:16px;font-weight:800;}
.mp-stat-label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin-top:2px;}
.mp-tags{display:flex;gap:4px;flex-wrap:wrap;}
.mp-tag{padding:3px 8px;border-radius:3px;background:#0d0d0d;border:1px solid #222;font-size:10px;color:#666;}
.mp-btn{display:block;margin-top:10px;text-align:center;padding:8px;background:var(--red);color:#fff;border-radius:6px;font-size:12px;font-weight:700;text-decoration:none;cursor:pointer;border:none;width:100%;transition:background .2s;}
.mp-btn:hover{background:#ff4444;}

/* List view */
#list-view{display:none;grid-column:2;grid-row:2;overflow-y:auto;padding:24px;}
.list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.list-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;cursor:pointer;transition:all 0.25s;}
.list-card:hover{border-color:#333;transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.lc-header{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.lc-flag{font-size:28px;}
.lc-score{margin-left:auto;font-size:22px;font-weight:800;}
.lc-name{font-size:16px;font-weight:700;}
.lc-country{font-size:12px;color:#555;}
.lc-bars{display:flex;flex-direction:column;gap:6px;}
.bar-row{display:flex;align-items:center;gap:8px;}
.bar-label{font-size:10px;color:#555;width:60px;text-transform:uppercase;letter-spacing:0.04em;}
.bar-track{flex:1;height:4px;background:#1a1a1a;border-radius:2px;overflow:hidden;}
.bar-fill{height:4px;border-radius:2px;transition:width .4s ease;}
.lc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:12px;}

/* Leaflet overrides */
.leaflet-popup-content-wrapper{background:#0d0d0d!important;color:#e0e0e0!important;border:1px solid #222!important;border-radius:10px!important;box-shadow:0 8px 32px rgba(0,0,0,0.6)!important;}
.leaflet-popup-tip{background:#0d0d0d!important;}
.leaflet-popup-content{margin:14px!important;}
.leaflet-control-zoom{background:#111!important;border-color:#222!important;}
.leaflet-control-zoom a{background:#111!important;color:#fff!important;border-color:#222!important;}
.leaflet-control-attribution{background:rgba(0,0,0,0.6)!important;color:#333!important;font-size:9px!important;}
.leaflet-control-attribution a{color:#444!important;}

/* Auth */
.auth-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9000;display:none;justify-content:center;align-items:center;backdrop-filter:blur(4px);}
.auth-overlay.open{display:flex;}
.auth-box{background:#0f0f0f;border:1px solid #222;border-radius:14px;padding:32px;width:380px;max-width:92vw;box-shadow:0 20px 60px rgba(0,0,0,0.6);}
.auth-box h2{color:#fff;text-align:center;font-size:18px;margin-bottom:20px;font-weight:800;}
.auth-tabs{display:flex;border-bottom:1px solid #1e1e1e;margin-bottom:20px;}
.auth-tab{flex:1;padding:10px;text-align:center;color:#444;cursor:pointer;font-size:13px;font-weight:600;border-bottom:2px solid transparent;transition:all .2s;}
.auth-tab.on{color:var(--red);border-color:var(--red);}
.auth-box input[type="email"],.auth-box input[type="password"]{width:100%;padding:12px 14px;margin-bottom:10px;background:#111;border:1px solid #1e1e1e;border-radius:8px;color:#e0e0e0;font-size:13px;transition:border-color .2s;}
.auth-box input:focus{border-color:var(--red);outline:none;box-shadow:0 0 0 2px rgba(255,45,45,0.1);}
.auth-box .submit-btn{width:100%;padding:12px;background:var(--red);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s;}
.auth-box .submit-btn:hover{background:#ff4444;}
.auth-msg{font-size:12px;text-align:center;margin-top:12px;color:var(--red);}
.auth-msg.ok{color:#2ecc71;}
.user-widget{display:flex;align-items:center;gap:8px;}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--red);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;}
.user-avatar:hover{transform:scale(1.1);}
.user-menu-dd{position:absolute;top:44px;right:16px;background:#0f0f0f;border:1px solid #222;border-radius:10px;min-width:160px;display:none;padding:6px 0;z-index:9999;box-shadow:0 12px 40px rgba(0,0,0,0.5);}
.user-menu-dd.open{display:block;}
.user-menu-dd a{display:block;padding:10px 16px;font-size:12px;color:#aaa;cursor:pointer;text-decoration:none;transition:all .15s;}
.user-menu-dd a:hover{color:#fff;background:#111;}
.join-btn{padding:7px 16px;background:var(--red);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s;}
.join-btn:hover{background:#ff4444;}

/* Detail panel */
#detail-panel{position:absolute;top:0;right:-400px;width:380px;height:100%;background:#0a0a0a;border-left:1px solid var(--border);z-index:500;overflow-y:auto;transition:right .3s cubic-bezier(0.4,0,0.2,1);box-shadow:-4px 0 20px rgba(0,0,0,0.3);}
#detail-panel.open{right:0;}
.dp-close{position:sticky;top:0;background:rgba(10,10,10,0.95);padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:1;backdrop-filter:blur(8px);}
.dp-close span{font-size:12px;font-weight:700;color:#444;text-transform:uppercase;letter-spacing:.08em;}
.dp-close button{background:none;border:none;color:#444;font-size:18px;cursor:pointer;padding:4px;transition:color .15s;}
.dp-close button:hover{color:#fff;}
.dp-body{padding:18px;}
.dp-hero{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.dp-flag{font-size:32px;}
.dp-name{font-size:19px;font-weight:800;color:#fff;letter-spacing:-0.02em;}
.dp-sub{font-size:11px;color:#444;margin-top:2px;}
.dp-score-badge{margin-left:auto;font-size:20px;font-weight:800;}
.dp-bars{margin-bottom:16px;}
.dp-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.dp-bar-label{font-size:10px;color:#444;width:52px;text-transform:uppercase;letter-spacing:.04em;font-weight:600;}
.dp-bar-track{flex:1;height:5px;background:#1a1a1a;border-radius:3px;overflow:hidden;}
.dp-bar-fill{height:5px;border-radius:3px;transition:width .4s ease;}
.dp-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px;}
.dp-tag{padding:3px 8px;background:#111;border:1px solid #1a1a1a;border-radius:4px;font-size:9px;color:#555;font-weight:600;}
.dp-visa{font-size:11px;color:#444;margin-bottom:18px;padding:8px 10px;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;}
.save-btns{display:flex;gap:6px;margin-bottom:18px;}
.save-btn{flex:1;padding:8px 4px;background:#111;border:1px solid #1e1e1e;border-radius:7px;color:#555;font-size:11px;font-weight:700;cursor:pointer;text-align:center;transition:all .2s;}
.save-btn:hover{border-color:#333;color:#888;}
.save-btn.on-wl{background:#1a0a0a;border-color:var(--red);color:var(--red);}
.save-btn.on-vi{background:#0a1a0a;border-color:#2ecc71;color:#2ecc71;}
.save-btn.on-li{background:#0a0a1a;border-color:#3498db;color:#3498db;}
.section-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#333;margin:16px 0 10px;display:flex;align-items:center;gap:6px;}
.review-item{padding:10px 0;border-bottom:1px solid #111;}
.rev-header{display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.rev-stars{color:#f39c12;font-size:11px;}
.rev-user{font-size:10px;color:#444;font-weight:600;}
.rev-date{font-size:9px;color:#333;margin-left:auto;}
.rev-text{font-size:12px;color:#888;line-height:1.6;}
.rev-meta{font-size:10px;color:#333;margin-top:3px;}
.add-form{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:10px;padding:14px;margin-top:10px;}
.star-pick{display:flex;gap:3px;margin-bottom:8px;}
.star-pick button{font-size:18px;cursor:pointer;color:#333;border:none;background:none;padding:0;transition:color .15s;}
.star-pick button.lit{color:#f39c12;}
.add-form textarea{width:100%;background:#111;border:1px solid #1e1e1e;border-radius:7px;color:#ccc;font-size:12px;padding:10px;resize:vertical;min-height:60px;font-family:inherit;transition:border-color .2s;}
.add-form textarea:focus{border-color:var(--red);outline:none;}
.add-form input[type="number"]{width:100%;padding:8px 10px;background:#111;border:1px solid #1e1e1e;border-radius:6px;color:#ccc;font-size:12px;margin-top:6px;transition:border-color .2s;}
.add-form input:focus{border-color:var(--red);outline:none;}
.add-form select{width:100%;padding:8px;background:#111;border:1px solid #1e1e1e;border-radius:6px;color:#aaa;font-size:12px;margin-top:6px;}
.form-submit{width:100%;margin-top:8px;padding:9px;background:var(--red);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:background .2s;}
.form-submit:hover{background:#ff4444;}
.tip-item{padding:8px 0;border-bottom:1px solid #111;}
.tip-cat{display:inline-block;padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;text-transform:uppercase;background:#111;border:1px solid #1a1a1a;color:#444;margin-bottom:4px;}
.tip-text{font-size:12px;color:#888;line-height:1.5;}
.form-row{display:flex;gap:8px;}
.form-row input{flex:1;}

/* My Cities panel */
.my-cities-panel{display:none;flex-direction:column;flex:1;overflow:hidden;}
.my-cities-panel.open{display:flex;}
.mc-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 14px;}
.mc-tab{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;color:#333;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.mc-tab:hover{color:#555;}
.mc-tab.on{color:var(--red);border-color:var(--red);}
#mc-list{flex:1;overflow-y:auto;padding:10px 14px;}
.mc-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #0d0d0d;cursor:pointer;transition:background .15s;}
.mc-item:hover{background:#111;border-radius:6px;padding:10px 6px;margin:0 -6px;}
.mc-item:hover .mc-name{color:#fff;}
.mc-name{font-size:13px;font-weight:600;color:#ccc;}
.mc-country{font-size:10px;color:#444;}
.mc-remove{margin-left:auto;background:none;border:none;color:#333;cursor:pointer;font-size:14px;padding:4px;transition:color .15s;}
.mc-remove:hover{color:var(--red);}

/* Leaderboard panel */
.lb-panel{display:none;flex-direction:column;flex:1;overflow:hidden;padding:14px 16px;}
.lb-panel.open{display:flex;}
.lb-title{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#333;margin-bottom:12px;}
.lb-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #0d0d0d;cursor:pointer;transition:background .15s;}
.lb-item:hover{background:#111;border-radius:6px;}
.lb-rank{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;background:#111;border:1px solid #222;color:#555;flex-shrink:0;}
.lb-rank.top3{background:var(--red);border-color:var(--red);color:#fff;}
.lb-name{font-size:13px;font-weight:600;color:#ccc;}
.lb-sub{font-size:10px;color:#444;}
.lb-count{margin-left:auto;font-size:11px;color:#444;font-weight:700;}
.lb-empty{color:#333;font-size:12px;padding:20px 0;text-align:center;}

.login-nudge{font-size:12px;color:#444;text-align:center;margin-top:10px;}
.login-nudge button{background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;font-weight:600;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#0f0f0f;border:1px solid #222;border-radius:10px;padding:10px 20px;font-size:13px;color:#e0e0e0;z-index:9999;display:none;opacity:0;transition:all .3s ease;box-shadow:0 8px 24px rgba(0,0,0,0.4);}
.toast.show{display:block;opacity:1;transform:translateX(-50%) translateY(0);}

/* Mobile */
@media(max-width:768px){
  #app{grid-template-columns:1fr;grid-template-rows:48px auto 1fr;}
  #sidebar{grid-row:2;grid-column:1;max-height:40vh;}
  #map-wrap{grid-row:3;grid-column:1;}
  #detail-panel{width:100%;right:-100%;}
  #list-view{grid-column:1;grid-row:3;}
  .list-grid{grid-template-columns:1fr;}
}
@media(max-width:480px){
  #topbar{gap:8px;padding:0 10px;}
  #search{max-width:160px;font-size:12px;padding:6px 10px;}
  .logo{font-size:14px;}
  .view-btn{padding:5px 10px;font-size:10px;}
}
</style>
</head>
<body>

<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <h2 id="authTitle">Join NomadMap</h2>
    <div class="auth-tabs">
      <div class="auth-tab on" data-tab="signup">Sign Up</div>
      <div class="auth-tab" data-tab="signin">Sign In</div>
    </div>
    <input type="email" id="authEmail" placeholder="Email address">
    <input type="password" id="authPassword" placeholder="Password (min 6 chars)">
    <button class="submit-btn" id="authSubmitBtn">Create Free Account</button>
    <p class="auth-msg" id="authMsg"></p>
  </div>
</div>

<div id="detail-panel">
  <div class="dp-close"><span>City Details</span><button id="dp-close-btn">&#x2715;</button></div>
  <div class="dp-body" id="dp-body"></div>
</div>

<div class="toast" id="toast"></div>

<div id="app">
  <div id="topbar">
    <div class="logo">Nomad<span>Map</span></div>
    <input id="search" type="text" placeholder="Search 100+ cities...">
    <div class="user-widget" id="userWidget"></div>
    <div class="user-menu-dd" id="userMenuDD"></div>
    <div class="city-count" id="city-count"></div>
    <div class="view-btns">
      <button class="view-btn active" id="btn-map" data-view="map">Map</button>
      <button class="view-btn" id="btn-list" data-view="list">List</button>
    </div>
  </div>

  <div id="sidebar">
    <div class="sidebar-tabs">
      <div class="sidebar-tab on" id="stab-explore" data-tab="explore">Explore</div>
      <div class="sidebar-tab" id="stab-mycities" data-tab="mycities">My Cities</div>
      <div class="sidebar-tab" id="stab-leaderboard" data-tab="leaderboard">Top 10</div>
    </div>
    <div id="explore-panel" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div id="filters">
        <div class="filter-label">Filters</div>
        <div class="filter-row">
          <select id="f-region">
            <option value="">All Regions</option>
            <option>Southeast Asia</option><option>East Asia</option>
            <option>Europe</option><option>Eastern Europe</option>
            <option>Latin America</option><option>North America</option>
            <option>Middle East</option><option>Africa</option>
            <option>Oceania</option>
          </select>
          <select id="f-cost">
            <option value="">Any Budget</option>
            <option value="1000">Under $1k/mo</option>
            <option value="1500">Under $1.5k/mo</option>
            <option value="2000">Under $2k/mo</option>
            <option value="3000">Under $3k/mo</option>
          </select>
          <select id="f-sort">
            <option value="score">Best Overall</option>
            <option value="cost">Cheapest First</option>
            <option value="internet">Fastest Internet</option>

// Compute scores
CITIES.forEach(function(c){var cs=Math.max(0,10-(c.cost/500));c.score=Math.round(cs*0.25+(c.internet/25)*0.2+c.safety*0.25+c.weather*0.15+c.fun*0.15);c.score=Math.min(10,Math.max(1,c.score));});

// Map
var map=L.map("map",{zoomControl:true}).setView([20,15],2);
L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",{attribution:"\u00a9 OpenStreetMap \u00a9 CARTO",subdomains:"abcd",maxZoom:19}).addTo(map);
setTimeout(function(){map.invalidateSize();},100);

function scoreClass(s){return s>=8?"score-great":s>=6?"score-good":"score-ok";}
function scoreColor(s){return s>=8?"#2ecc71":s>=6?"#f39c12":"#e74c3c";}
function barColor(v,m){var p=v/m;return p>0.7?"#2ecc71":p>0.4?"#f39c12":"#e74c3c";}
function esc(s){var d=document.createElement("div");d.textContent=s;return d.innerHTML;}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}

// Markers with review count scaling
function markerSize(id){var c=reviewCounts[id]||0;return 10+Math.min(c*2,16);}
function makeMarker(city){var color=scoreColor(city.score),size=markerSize(city.id);var icon=L.divIcon({className:"",html:'<div style="background:'+color+";width:"+size+"px;height:"+size+"px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);box-shadow:0 0 10px "+color+'66;cursor:pointer;transition:transform .15s;" onmouseenter="this.style.transform=\'scale(1.3)\'" onmouseleave="this.style.transform=\'scale(1)\'"></div>',iconSize:[size,size],iconAnchor:[size/2,size/2],popupAnchor:[0,-size/2]});var m=L.marker([city.lat,city.lng],{icon:icon}).addTo(map);m.bindPopup(buildPopup(city),{maxWidth:280,minWidth:240});m.on("click",function(){selectCity(city.id);});return m;}
function buildPopup(c){var tags=c.tags.slice(0,4).map(function(t){return'<span class="mp-tag">'+esc(t)+"</span>";}).join(""),rc=reviewCounts[c.id]||0;return'<div class="map-popup"><div class="mp-name">'+c.flag+" "+esc(c.name)+'</div><div class="mp-country">'+esc(c.country)+" \u00b7 "+esc(c.region)+(rc?" \u00b7 "+rc+" reviews":"")+'</div><div class="mp-grid"><div class="mp-stat"><div class="mp-stat-val" style="color:#f39c12">$'+c.cost.toLocaleString()+'</div><div class="mp-stat-label">/ month</div></div><div class="mp-stat"><div class="mp-stat-val" style="color:#3498db">'+c.internet+'</div><div class="mp-stat-label">Mbps avg</div></div><div class="mp-stat"><div class="mp-stat-val" style="color:#2ecc71">'+c.safety+'/10</div><div class="mp-stat-label">Safety</div></div><div class="mp-stat"><div class="mp-stat-val" style="color:'+scoreColor(c.score)+'">'+c.score+'/10</div><div class="mp-stat-label">Overall</div></div></div><div class="mp-tags">'+tags+'</div><div style="font-size:11px;color:#555;margin-top:8px;">Visa: '+esc(c.visa)+'</div><button class="mp-btn" data-city="'+c.id+'">View Details</button></div>';}
function renderMarkers(){Object.values(markers).forEach(function(m){map.removeLayer(m);});markers={};filtered.forEach(function(c){markers[c.id]=makeMarker(c);});}

function renderList(){var el=document.getElementById("city-list");el.innerHTML=filtered.map(function(c){var cs=c.cost>=1000?(c.cost/1000).toFixed(1)+"k":c.cost;return'<div class="city-card'+(activeCity===c.id?" active":"")+'" data-city="'+c.id+'"><div class="city-flag">'+c.flag+'</div><div class="city-info"><div class="city-name">'+esc(c.name)+'</div><div class="city-country">'+esc(c.country)+'</div><div class="city-stats"><div class="stat"><div class="stat-val" style="color:#f39c12">$'+cs+'</div><div class="stat-label">/ mo</div></div><div class="stat"><div class="stat-val" style="color:#3498db">'+c.internet+'</div><div class="stat-label">Mbps</div></div><div class="stat"><div class="stat-val" style="color:#2ecc71">'+c.safety+'/10</div><div class="stat-label">Safety</div></div><div class="stat"><div class="stat-val" style="color:#e67e22">'+c.weather+'/10</div><div class="stat-label">Weather</div></div></div><div class="city-tags">'+c.tags.slice(0,3).map(function(t){return'<span class="city-tag">'+esc(t)+"</span>";}).join("")+'</div></div><div class="city-score '+scoreClass(c.score)+'">'+c.score+"</div></div>";}).join("");}

function selectCity(id){activeCity=id;var city=CITIES.find(function(c){return c.id===id;});if(!city)return;renderList();if(currentView==="map"){map.flyTo([city.lat,city.lng],10,{duration:1});setTimeout(function(){if(markers[id])markers[id].openPopup();},1000);}openDetail(id);}

// Filters
function applyFilters(){var region=document.getElementById("f-region").value,maxCost=parseInt(document.getElementById("f-cost").value)||999999,sort=document.getElementById("f-sort").value,search=document.getElementById("search").value.toLowerCase();filtered=CITIES.filter(function(c){if(region&&c.region!==region)return false;if(c.cost>maxCost)return false;if(activeTag&&!c.tags.some(function(t){return t.includes(activeTag);}))return false;if(search&&!c.name.toLowerCase().includes(search)&&!c.country.toLowerCase().includes(search)&&!c.tags.some(function(t){return t.includes(search);}))return false;return true;});filtered.sort(function(a,b){if(sort==="cost")return a.cost-b.cost;if(sort==="internet")return b.internet-a.internet;if(sort==="safety")return b.safety-a.safety;if(sort==="weather")return b.weather-a.weather;if(sort==="fun")return b.fun-a.fun;return b.score-a.score;});document.getElementById("city-count").textContent=filtered.length+" cities";renderList();renderMarkers();if(currentView==="list")renderListView();}

function setView(v){currentView=v;document.getElementById("btn-map").classList.toggle("active",v==="map");document.getElementById("btn-list").classList.toggle("active",v==="list");document.getElementById("map-wrap").style.display=v==="map"?"":"none";document.getElementById("list-view").style.display=v==="list"?"block":"none";if(v==="list")renderListView();if(v==="map")map.invalidateSize();}
document.querySelector(".view-btns").addEventListener("click",function(e){var btn=e.target.closest(".view-btn");if(btn)setView(btn.dataset.view);});

function renderUserWidget(){var w=document.getElementById("userWidget"),dd=document.getElementById("userMenuDD");if(!w)return;if(sbUser){var ini=(sbUser.email[0]||"U").toUpperCase();w.innerHTML='<div class="user-avatar" id="avatarBtn" title="'+esc(sbUser.email)+'">'+ini+"</div>";dd.innerHTML='<a data-action="mycities">My Cities</a><a data-action="signout">Sign Out</a>';}else{w.innerHTML='<button class="join-btn" id="joinBtn">Join Free</button>';dd.innerHTML="";}}
document.getElementById("userWidget").addEventListener("click",function(e){if(e.target.closest(".user-avatar"))document.getElementById("userMenuDD").classList.toggle("open");else if(e.target.closest(".join-btn"))showAuth();});
document.getElementById("userMenuDD").addEventListener("click",function(e){var a=e.target.closest("a");if(!a)return;document.getElementById("userMenuDD").classList.remove("open");if(a.dataset.action==="mycities")sidebarTab("mycities");else if(a.dataset.action==="signout")doSignOut();});
document.addEventListener("click",function(e){if(!e.target.closest("#userWidget")&&!e.target.closest("#userMenuDD"))document.getElementById("userMenuDD").classList.remove("open");});
async function doSignOut(){await sb.auth.signOut();showToast("Signed out");}

// Sidebar tabs
function sidebarTab(tab){document.getElementById("stab-explore").classList.toggle("on",tab==="explore");document.getElementById("stab-mycities").classList.toggle("on",tab==="mycities");document.getElementById("stab-leaderboard").classList.toggle("on",tab==="leaderboard");document.getElementById("explore-panel").style.display=tab==="explore"?"flex":"none";document.getElementById("mc-panel").style.display=tab==="mycities"?"flex":"none";document.getElementById("lb-panel").style.display=tab==="leaderboard"?"flex":"none";if(tab==="mycities"){if(!sbUser){showAuth();sidebarTab("explore");return;}renderMyCities();}if(tab==="leaderboard")loadLeaderboard();}
document.querySelector(".sidebar-tabs").addEventListener("click",function(e){var tab=e.target.closest(".sidebar-tab");if(tab)sidebarTab(tab.dataset.tab);});

// My Cities
document.querySelector(".mc-tabs").addEventListener("click",function(e){var tab=e.target.closest(".mc-tab");if(!tab)return;mcTabState=tab.dataset.t;document.querySelectorAll(".mc-tab").forEach(function(t){t.classList.toggle("on",t.dataset.t===mcTabState);});renderMyCities();});
async function loadSaved(){if(!sbUser){savedCities={};return;}var r=await sb.from("saved_cities").select("city_id,status").eq("user_id",sbUser.id);savedCities={};(r.data||[]).forEach(function(row){savedCities[row.city_id]=row.status;});if(detailCity)refreshSaveBtns(detailCity.id);}
async function toggleSave(cityId,cityName,status){if(!sbUser){showAuth();return;}if(savedCities[cityId]===status){await sb.from("saved_cities").delete().eq("user_id",sbUser.id).eq("city_id",cityId);delete savedCities[cityId];showToast("Removed");}else{await sb.from("saved_cities").upsert({user_id:sbUser.id,city_id:cityId,city_name:cityName,status:status},{onConflict:"user_id,city_id"});savedCities[cityId]=status;showToast(status==="wishlist"?"Added to Wishlist":status==="visited"?"Marked Visited":"Set as Living Here");}refreshSaveBtns(cityId);loadLeaderboard();}
function refreshSaveBtns(cityId){var st=savedCities[cityId];["wishlist","visited","living"].forEach(function(s){var b=document.getElementById("sb-"+s);if(b)b.className="save-btn"+(st===s?" on-"+s.substring(0,2):"");});}
async function renderMyCities(){if(!sbUser)return;var list=document.getElementById("mc-list");list.innerHTML='<div style="color:#333;font-size:12px;padding:16px 0;text-align:center">Loading...</div>';var r=await sb.from("saved_cities").select("*").eq("user_id",sbUser.id).eq("status",mcTabState);if(!r.data||r.data.length===0){var labels={wishlist:"No cities wishlisted yet",visited:"No cities marked as visited",living:"Not living anywhere yet"};list.innerHTML='<div style="color:#333;font-size:12px;padding:16px 0;text-align:center">'+labels[mcTabState]+"</div>";return;}list.innerHTML=r.data.map(function(row){var city=CITIES.find(function(c){return c.id===row.city_id;})||{};return'<div class="mc-item" data-city="'+esc(row.city_id)+'"><div style="font-size:18px">'+(city.flag||"")+'</div><div><div class="mc-name">'+esc(row.city_name)+'</div><div class="mc-country">'+esc(city.country||"")+'</div></div><button class="mc-remove" data-remove="'+esc(row.city_id)+'">\u00d7</button></div>';}).join("");}
document.getElementById("mc-list").addEventListener("click",function(e){var rb=e.target.closest(".mc-remove");if(rb){e.stopPropagation();removeSaved(rb.dataset.remove);return;}var item=e.target.closest(".mc-item");if(item){selectCity(item.dataset.city);sidebarTab("explore");}});
async function removeSaved(cityId){await sb.from("saved_cities").delete().eq("user_id",sbUser.id).eq("city_id",cityId);delete savedCities[cityId];renderMyCities();showToast("Removed");loadLeaderboard();}

// Leaderboard
async function loadLeaderboard(){var list=document.getElementById("lb-list");if(!list)return;try{var r2=await sb.from("saved_cities").select("city_id, city_name");if(r2.data&&r2.data.length>0){var counts={},names={};r2.data.forEach(function(row){counts[row.city_id]=(counts[row.city_id]||0)+1;names[row.city_id]=row.city_name;});var sorted=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a];}).slice(0,10);list.innerHTML=sorted.map(function(cid,i){var city=CITIES.find(function(c){return c.id===cid;});return'<div class="lb-item" data-city="'+esc(cid)+'"><div class="lb-rank'+(i<3?" top3":"")+'">'+(i+1)+'</div><div style="font-size:18px">'+(city?city.flag:"")+'</div><div><div class="lb-name">'+esc(names[cid]||(city?city.name:cid))+'</div><div class="lb-sub">'+(city?esc(city.country):"")+'</div></div><div class="lb-count">'+counts[cid]+" saves</div></div>";}).join("");}else{list.innerHTML='<div class="lb-empty">No saves yet. Be the first to save a city!</div>';}}catch(err){list.innerHTML='<div class="lb-empty">Could not load leaderboard</div>';}}
document.getElementById("lb-list").addEventListener("click",function(e){var item=e.target.closest(".lb-item");if(item){sidebarTab("explore");selectCity(item.dataset.city);}});

// Review counts for marker scaling
async function loadReviewCounts(){try{var r=await sb.from("city_reviews").select("city_id");if(r.data){reviewCounts={};r.data.forEach(function(row){reviewCounts[row.city_id]=(reviewCounts[row.city_id]||0)+1;});renderMarkers();}}catch(e){}}

// Detail panel
document.getElementById("dp-close-btn").addEventListener("click",function(){document.getElementById("detail-panel").classList.remove("open");detailCity=null;});

async function openDetail(cityId){detailCity=CITIES.find(function(c){return c.id===cityId;});if(!detailCity)return;document.getElementById("detail-panel").classList.add("open");var body=document.getElementById("dp-body");body.innerHTML='<div style="color:#333;padding:20px;font-size:13px;text-align:center">Loading...</div>';var revP=sb.from("city_reviews").select("*").eq("city_id",cityId).order("created_at",{ascending:false}).limit(20),tipP=sb.from("city_tips").select("*").eq("city_id",cityId).order("likes",{ascending:false}).limit(15),results=await Promise.all([revP,tipP]),reviews=results[0].data||[],tips=results[1].data||[],avgR=reviews.length?(reviews.reduce(function(s,r){return s+r.rating;},0)/reviews.length).toFixed(1):null,c=detailCity,sc=scoreColor(c.score);
function bar(label,val,pct,color){return'<div class="dp-bar-row"><div class="dp-bar-label">'+label+'</div><div class="dp-bar-track"><div class="dp-bar-fill" style="width:'+pct+"%;background:"+color+'"></div></div><div style="font-size:10px;color:#444;width:50px;text-align:right">'+val+"</div></div>";}
var h='<div class="dp-hero"><div class="dp-flag">'+c.flag+'</div><div><div class="dp-name">'+esc(c.name)+'</div><div class="dp-sub">'+esc(c.country)+" \u00b7 "+esc(c.region)+'</div></div><div class="dp-score-badge" style="color:'+sc+'">'+c.score+"/10</div></div>";
h+='<div class="dp-bars">'+bar("Cost","$"+c.cost+"/mo",Math.max(0,100-c.cost/50),"#f39c12")+bar("Internet",c.internet+" Mbps",Math.min(100,c.internet/2.5),"#3498db")+bar("Safety",c.safety+"/10",c.safety*10,"#2ecc71")+bar("Weather",c.weather+"/10",c.weather*10,"#e67e22")+bar("Fun",c.fun+"/10",c.fun*10,"#9b59b6")+"</div>";
h+='<div class="dp-tags">'+c.tags.map(function(t){return'<span class="dp-tag">'+esc(t)+"</span>";}).join("")+"</div>";
h+='<div class="dp-visa">\u{1F4CB} Visa: '+esc(c.visa)+"</div>";
h+='<div class="save-btns"><button class="save-btn" id="sb-wishlist" data-save="wishlist">\u2661 Wishlist</button><button class="save-btn" id="sb-visited" data-save="visited">\u2713 Visited</button><button class="save-btn" id="sb-living" data-save="living">\u{1F3E0} Living</button></div>';
h+='<div class="section-title">Reviews '+(reviews.length>0?"("+reviews.length+") \u00b7 \u2605"+avgR:"(0)")+"</div>";
if(reviews.length===0)h+='<div style="color:#333;font-size:12px;padding:8px 0">No reviews yet. Be the first!</div>';
else reviews.forEach(function(r){h+='<div class="review-item"><div class="rev-header"><span class="rev-stars">'+"\u2605".repeat(r.rating)+'<span style="color:#222">'+"\u2605".repeat(5-r.rating)+"</span></span><span class=\"rev-user\">"+esc(r.reviewer_email||"nomad")+'</span><span class="rev-date">'+new Date(r.created_at).toLocaleDateString()+"</span></div>";if(r.review)h+='<div class="rev-text">'+esc(r.review)+"</div>";if(r.cost_actual||r.internet_actual)h+='<div class="rev-meta">'+(r.cost_actual?"$"+r.cost_actual+"/mo actual":"")+(r.internet_actual?" \u00b7 "+r.internet_actual+"Mbps":"")+"</div>";h+="</div>";});
if(sbUser){h+='<div class="add-form" id="review-form"><div class="section-title" style="margin:0 0 8px">Write a Review</div><div class="star-pick" id="starPick">';for(var i=1;i<=5;i++)h+='<button data-n="'+i+'">\u2605</button>';h+='</div><textarea id="revText" placeholder="Your experience..."></textarea><div class="form-row"><input type="number" id="revCost" placeholder="Actual $/mo"><input type="number" id="revNet" placeholder="Actual Mbps"></div><button class="form-submit" id="submitReviewBtn">Post Review</button></div>';}else{h+='<div class="login-nudge"><button id="loginForReview">Sign in</button> to write a review</div>';}
h+='<div class="section-title" style="margin-top:18px">Tips ('+tips.length+")</div>";
if(tips.length===0)h+='<div style="color:#333;font-size:12px;padding:8px 0">No tips yet.</div>';
else tips.forEach(function(t){h+='<div class="tip-item"><span class="tip-cat">'+esc(t.category)+'</span><div class="tip-text">'+esc(t.tip)+"</div></div>";});
if(sbUser){h+='<div class="add-form" id="tip-form"><div class="section-title" style="margin:0 0 8px">Add a Tip</div><textarea id="tipText" placeholder="Share a tip..."></textarea><select id="tipCat"><option value="general">General</option><option value="food">Food</option><option value="coworking">Coworking</option><option value="housing">Housing</option><option value="transport">Transport</option><option value="safety">Safety</option></select><button class="form-submit" id="submitTipBtn" style="margin-top:6px">Post Tip</button></div>';}else{h+='<div class="login-nudge"><button id="loginForTip">Sign in</button> to add a tip</div>';}
body.innerHTML=h;refreshSaveBtns(cityId);reviewStars=0;bindDetailEvents(c);}

function bindDetailEvents(city){var body=document.getElementById("dp-body");body.querySelectorAll(".save-btn[data-save]").forEach(function(btn){btn.addEventListener("click",function(){toggleSave(city.id,city.name,btn.dataset.save);});});var sp=document.getElementById("starPick");if(sp)sp.addEventListener("click",function(e){var btn=e.target.closest("button");if(!btn)return;reviewStars=parseInt(btn.dataset.n);sp.querySelectorAll("button").forEach(function(b){b.classList.toggle("lit",parseInt(b.dataset.n)<=reviewStars);});});var sr=document.getElementById("submitReviewBtn");if(sr)sr.addEventListener("click",async function(){if(!sbUser){showAuth();return;}if(!reviewStars){showToast("Select a rating");return;}var text=document.getElementById("revText").value.trim(),cost=parseInt(document.getElementById("revCost").value)||null,inet=parseInt(document.getElementById("revNet").value)||null;sr.textContent="Posting...";sr.disabled=true;var res=await sb.from("city_reviews").insert({user_id:sbUser.id,city_id:city.id,city_name:city.name,rating:reviewStars,review:text||null,cost_actual:cost,internet_actual:inet,reviewer_email:sbUser.email.split("@")[0]});if(res.error){showToast("Error: "+res.error.message);sr.textContent="Post Review";sr.disabled=false;return;}showToast("Review posted!");reviewCounts[city.id]=(reviewCounts[city.id]||0)+1;renderMarkers();openDetail(city.id);});var st=document.getElementById("submitTipBtn");if(st)st.addEventListener("click",async function(){if(!sbUser){showAuth();return;}var tip=document.getElementById("tipText").value.trim();if(!tip){showToast("Write a tip first");return;}var cat=document.getElementById("tipCat").value;st.textContent="Posting...";st.disabled=true;var res=await sb.from("city_tips").insert({user_id:sbUser.id,city_id:city.id,tip:tip,category:cat});if(res.error){showToast("Error: "+res.error.message);st.textContent="Post Tip";st.disabled=false;return;}showToast("Tip posted!");openDetail(city.id);});var lr=document.getElementById("loginForReview");if(lr)lr.addEventListener("click",showAuth);var lt=document.getElementById("loginForTip");if(lt)lt.addEventListener("click",showAuth);}
renderUserWidget();
</script>
